  { category: "History", fact: "The zipper was invented in 1913 but didn't become popular for <em>20 years</em> due to marketing failures.", detail: "Whitcomb Judson's early design was unreliable; Gideon Sundback improved it in 1913 but tailors resisted change." },
  { category: "History", fact: "Genghis Khan's empire was so vast it covered <em>24 million km2</em> — about 22% of all land on Earth.", detail: "At its peak, the Mongol Empire connected trade routes from China to Eastern Europe." },
  { category: "History", fact: "The bikini was named after <em>Bikini Atoll</em>, the nuclear test site.", detail: "Designer Louis Réard named it in 1946 — the same week atomic bombs were tested there — predicting it would 'explode.'" },
  { category: "History", fact: "Ancient Egyptians played a board game called <em>Senet</em> — one of the oldest known games in human history.", detail: "It was found in tombs dating to 3100 BC and may have had religious significance about the afterlife." },
  { category: "History", fact: "The Hundred Years' War between England and France actually lasted <em>116 years</em>.", detail: "Fought from 1337 to 1453, it fundamentally shaped both nations' identities and languages." },
  { category: "History", fact: "A medieval peasant worked fewer days per year than a modern <em>American office worker</em>.", detail: "Religious holidays and local festivals meant many medieval workers had 8 weeks of rest annually." },
  { category: "History", fact: "The Great Wall of China was largely <em>ineffective</em> as a military defense.", detail: "Enemies routinely bribed guards or found gaps — its real value was controlling trade and taxing movement." },
  { category: "History", fact: "Mount Vesuvius's eruption in 79 AD was so powerful it <em>vaporized some victims instantly</em>.", detail: "Skull fragments from Herculaneum show brains flash-heated and vaporized by the 500 degree C surge." },
  { category: "History", fact: "The first woman to run for US president was <em>Victoria Woodhull in 1872</em> — before women could vote.", detail: "She ran on the Equal Rights Party ticket alongside Frederick Douglass as her VP candidate." },
  { category: "History", fact: "Hannibal crossed the Alps with <em>37 war elephants</em> to invade Rome from the north.", detail: "Most elephants died during or shortly after the crossing, but the tactical surprise was complete." },
  { category: "History", fact: "The word 'muscle' comes from the Latin <em>'musculus'</em> meaning little mouse.", detail: "Romans thought a flexing muscle under skin resembled a mouse moving beneath a cloth." },
  { category: "History", fact: "The Roman Empire at its height had a <em>GDP comparable to modern Argentina</em>.", detail: "Rome's economic sophistication included banking, contracts, and long-distance trade networks." },
  { category: "History", fact: "The Eiffel Tower was built as a <em>temporary structure</em> for the 1889 World's Fair.", detail: "It was meant to be demolished after 20 years but was saved because it made a useful radio antenna." },
  { category: "History", fact: "Lord Byron kept a pet <em>bear</em> in his dormitory at Cambridge University.", detail: "When told he couldn't keep a dog, he checked the rulebook and found bears weren't prohibited." },
  { category: "History", fact: "The last survivor of the American Civil War died in <em>1956</em>.", detail: "Albert Woolson, a Union drummer boy, died at age 109 — over 90 years after the war ended." },
  { category: "History", fact: "Ancient Vikings played a strategy board game called <em>Hnefatafl</em>.", detail: "It was played across Northern Europe for centuries before chess replaced it around 1000 AD." },
  { category: "History", fact: "The Aztec capital Tenochtitlan was larger than any city in <em>contemporary Europe</em> when Cortés arrived.", detail: "With a population of 200,000–300,000, it dwarfed London and Paris of the early 1500s." },
  { category: "History", fact: "The French Revolution's Reign of Terror executed about <em>17,000 people officially</em> — but up to 40,000 died in total.", detail: "The guillotine was considered a humane, egalitarian form of execution — applying equally to nobles and commoners." },
  { category: "History", fact: "Hippocrates wrote medical texts over <em>2,400 years ago</em> that are still referenced today.", detail: "The Hippocratic Oath, still sworn by physicians, dates from ancient Greece." },
  { category: "History", fact: "The US Declaration of Independence was signed on <em>August 2, 1776</em> — not July 4th.", detail: "July 4 was when Congress approved the text; most delegates signed the parchment a month later." },
  { category: "History", fact: "Medieval peasants believed bathing too frequently caused <em>disease by opening pores</em> to bad air.", detail: "Ironically, Queen Isabella of Castile boasted she had only bathed twice in her life." },
  { category: "History", fact: "The Mongol Empire had the world's first <em>international postal system</em>.", detail: "The Yam relay system used thousands of stations and horses to carry messages across the empire in days." },
  { category: "History", fact: "Ancient Chinese engineers invented <em>paper money</em> in the 7th century AD — 600 years before Europe.", detail: "Early bank notes were called 'flying money' because they could move wealth without physical coin." },
  { category: "History", fact: "The longest-reigning monarch in recorded history was <em>Pepi II of ancient Egypt</em> — approximately 90 years.", detail: "He reportedly ascended the throne at age 6 and died around age 100." },
  { category: "History", fact: "Charles Darwin and Abraham Lincoln were born on <em>exactly the same day</em> — February 12, 1809.", detail: "One transformed humanity's understanding of life; the other transformed American society." },
  { category: "History", fact: "The Titanic's maiden voyage was the <em>first and only</em> time it ever sailed.", detail: "It sank on April 15, 1912 — just 5 days after departing Southampton." },
  { category: "History", fact: "Florence Nightingale was the world's first person to use <em>infographics</em> to save lives.", detail: "She used polar area charts to show that most soldiers were dying from preventable infections, not wounds." },
  { category: "History", fact: "The typewriter changed women's employment — it was specifically marketed as a <em>feminine machine</em> in the 1870s.", detail: "This created entirely new categories of professional work for women in offices." },
  { category: "History", fact: "Sherlock Holmes never actually says <em>'Elementary, my dear Watson'</em> in any of Conan Doyle's original stories.", detail: "The phrase was invented by later adaptations — the original Holmes is more arrogant and blunt." },
  { category: "History", fact: "The Soviet Union and USA were <em>allied</em> during World War II before becoming Cold War rivals.", detail: "Lend-Lease delivered $180 billion in today's value of supplies from the US to the USSR." },
  { category: "History", fact: "Plato's real name was <em>Aristocles</em> — Plato was a nickname meaning 'broad-shouldered.'", detail: "He was a champion wrestler before turning to philosophy." },
  { category: "History", fact: "The Pyramids of Giza were <em>sheathed in white polished limestone</em> and would have gleamed in sunlight.", detail: "The outer casing was stripped for building materials by medieval Egyptian rulers." },
  { category: "History", fact: "Contrary to popular belief, Napoleon was <em>average height</em> for his time — about 5'7\".", detail: "The myth arose from a misunderstanding between French and British inches and British caricatures." },
  { category: "History", fact: "The Silk Road was not one road but a <em>network of thousands of routes</em> spanning 6,400 km.", detail: "It connected China to Rome and transmitted not just silk but ideas, religions, and diseases." },
  { category: "Geography", fact: "The Mariana Trench is so deep that <em>Mount Everest would fit inside it</em> with over a mile to spare.", detail: "Challenger Deep measures 10,935 m; Everest is 8,849 m tall." },
  { category: "Geography", fact: "More people live in <em>Tokyo</em> than in all of Australia.", detail: "Tokyo's greater metropolitan area holds about 37 million people; Australia has about 26 million." },
  { category: "Geography", fact: "The Nile and the Amazon are <em>rivals</em> for the title of world's longest river.", detail: "Measurements vary by method — the Nile measures longer by some methods, the Amazon by others." },
  { category: "Geography", fact: "Canada has the <em>longest coastline</em> of any country at over 202,000 km.", detail: "It's so long that if you walked it without stopping, it would take over 4.5 years." },
  { category: "Geography", fact: "The shortest international border in the world is between <em>Spain and Gibraltar</em> — just 1.2 km.", detail: "It's one of the world's most crossed borders despite its tiny length." },
  { category: "Geography", fact: "Diomede Islands in the Bering Strait are just <em>3.8 km apart</em> but 21 hours apart in time.", detail: "The International Date Line runs between them — Big Diomede (Russia) and Little Diomede (USA)." },
  { category: "Geography", fact: "The Sahara Desert is almost exactly the same size as the <em>contiguous United States</em>.", detail: "Both cover roughly 9.4 million km2." },
  { category: "Geography", fact: "Bosnia and Herzegovina has only <em>21 km of coastline</em> — one of the shortest in the world.", detail: "This tiny Adriatic strip at Neum is the country's only access to the sea." },
  { category: "Geography", fact: "Earth's largest waterfall is actually <em>underwater</em> — in the Denmark Strait.", detail: "Cold, dense water from the Nordic Seas plunges 3,500 m — far taller than any surface waterfall." },
  { category: "Geography", fact: "The Republic of Nauru is the world's <em>smallest island nation</em> — just 21 km2.", detail: "At its peak wealth from phosphate mining in the 1980s, it had the highest per-capita income on Earth." },
  { category: "Geography", fact: "Mount Olympus on Mars is so wide that if you stood at its base you <em>couldn't see the summit</em>.", detail: "It's 600 km wide — the curvature of Mars means the peak is below the horizon from the base." },
  { category: "Geography", fact: "The entire country of Switzerland has no <em>coastline</em> but has the world's most inland port.", detail: "Basel is connected to the Rhine and Rotterdam's sea port some 800 km away." },
  { category: "Geography", fact: "Russia shares land borders with <em>14 different countries</em> — more than any other nation.", detail: "Its neighbors span from Norway in the northwest to North Korea in the southeast." },
  { category: "Geography", fact: "The Amazon River discharges more water than the next <em>seven largest rivers combined</em>.", detail: "It accounts for about 20% of all freshwater flowing into Earth's oceans." },
  { category: "Geography", fact: "There are more <em>pyramids in Sudan</em> than in Egypt.", detail: "The Nubian pyramids of the ancient Kushite kingdoms number around 255 — Egypt has about 130." },
  { category: "Geography", fact: "The state of Alaska has more coastline than all other US states <em>combined</em>.", detail: "Its convoluted shoreline stretches over 54,000 km — more than the entire lower 48 states." },
  { category: "Geography", fact: "Luxembourg is the only country in the world ruled by a <em>Grand Duke</em>.", detail: "Henri, Grand Duke of Luxembourg, has reigned since 2000." },
  { category: "Geography", fact: "The distance from Los Angeles to New York is less than the <em>width of Russia</em>.", detail: "Russia spans about 9,000 km east to west; LA to NY is about 4,500 km." },
  { category: "Geography", fact: "Bolivia has <em>two capitals</em> — Sucre is the constitutional capital and La Paz is the seat of government.", detail: "La Paz, at 3,640 m, is the world's highest-altitude seat of government." },
  { category: "Geography", fact: "The world's most visited country is <em>France</em> — receiving about 90 million tourists per year.", detail: "Paris alone receives more visitors than any other city, largely due to the Eiffel Tower and the Louvre." },
  { category: "Geography", fact: "Iceland runs on <em>100% renewable energy</em> for electricity and heating.", detail: "It harnesses geothermal and hydroelectric power — volcanic activity makes it an energy-rich nation." },
  { category: "Geography", fact: "The Gobi Desert is expanding by about <em>3,600 km2 per year</em> — a process called desertification.", detail: "Overgrazing and climate change are pushing the desert into Inner Mongolia and northern China." },
  { category: "Geography", fact: "Colombia is the only country in South America with coastline on both the <em>Pacific and Atlantic Oceans</em>.", detail: "The Caribbean and Pacific shores give it enormous marine biodiversity." },
  { category: "Geography", fact: "There is a town called <em>Batman</em> in southeastern Turkey.", detail: "Its authorities once attempted to sue director Christopher Nolan for using the name." },
  { category: "Geography", fact: "The highest navigable lake in the world is <em>Lake Titicaca</em> in South America at 3,812 m.", detail: "It sits on the border of Peru and Bolivia and contains the world's highest-altitude floating islands." },
  { category: "Geography", fact: "In the tiny Italian village of <em>Candela</em>, the government pays people to move there.", detail: "Depopulation is such a crisis in rural Italy that some villages offer grants of up to 30,000 euros." },
  { category: "Technology", fact: "The first computer virus was created in <em>1971</em> and was harmless — it just displayed a message.", detail: "The Creeper program spread across ARPANET displaying 'I'm the creeper, catch me if you can!'" },
  { category: "Technology", fact: "The average person spends about <em>7 hours per day</em> looking at screens.", detail: "This has roughly tripled since smartphones became ubiquitous around 2010." },
  { category: "Technology", fact: "The term <em>'spam'</em> for unwanted email comes from a Monty Python sketch.", detail: "The sketch involved Vikings singing 'spam' repeatedly — echoing the unavoidable repetition of bulk email." },
  { category: "Technology", fact: "The first hard drive — IBM's 350 RAMAC — weighed a tonne and stored <em>5 megabytes</em>.", detail: "Introduced in 1956, it leased for $3,200 per month — about $35,000 in today's money." },
  { category: "Technology", fact: "There are more <em>IoT devices</em> on Earth than there are people — and the gap is growing.", detail: "Connected devices include smart TVs, cars, appliances, and industrial sensors." },
  { category: "Technology", fact: "The world's first computer bug fix used actual <em>adhesive tape</em>.", detail: "Grace Hopper's team taped the moth into the logbook — making 'debugging' a literal term." },
  { category: "Technology", fact: "A modern Formula 1 car generates enough downforce at speed to <em>drive upside-down on a ceiling</em>.", detail: "At around 130 km/h, the aerodynamic downforce exceeds the car's weight." },
  { category: "Technology", fact: "The first iPhone had <em>no copy and paste</em> function.", detail: "Steve Jobs initially believed the touchscreen keyboard made the feature unnecessary — it was added in 2009." },
  { category: "Technology", fact: "The global data created each day would take <em>181 million years</em> to watch as video.", detail: "In 2025, humans generate an estimated 2.5 quintillion bytes of data every single day." },
  { category: "Technology", fact: "The Amazon logo's arrow points from A to Z — suggesting they sell <em>everything</em>.", detail: "The arrow also forms a smile, subtly associating the brand with happiness and satisfaction." },
  { category: "Technology", fact: "3D printing is now used to build <em>entire houses</em> in under 24 hours.", detail: "ICON and other companies are printing homes layer by layer from concrete mixtures for disaster relief and affordable housing." },
  { category: "Technology", fact: "The first satellite — <em>Sputnik</em> — was launched in 1957 and orbited for 3 weeks before its batteries died.", detail: "It continued to orbit silently for 2 more months before re-entering the atmosphere." },
  { category: "Technology", fact: "Computer keyboards still use the <em>QWERTY layout</em> designed to slow typists down for mechanical typewriters.", detail: "Attempts to replace it with faster layouts like Dvorak have largely failed due to inertia." },
  { category: "Technology", fact: "NASA's Apollo guidance computer had less processing power than a <em>modern digital greeting card</em>.", detail: "The card's chip runs at speeds millions of times faster than the computer that landed men on the Moon." },
  { category: "Technology", fact: "The internet was originally called <em>ARPANET</em> and connected only four universities in 1969.", detail: "UCLA, Stanford, UC Santa Barbara, and the University of Utah formed the first network." },
  { category: "Technology", fact: "Tesla's electric cars use over-the-air software updates — meaning your car can <em>improve overnight</em>.", detail: "Features, range, and performance have all been improved remotely without visiting a service center." },
  { category: "Technology", fact: "The first commercial email spam was sent in <em>1978</em> — to 400 people on ARPANET.", detail: "Gary Thuerk sent an unsolicited ad for DEC computers and received both angry replies and actual sales." },
  { category: "Technology", fact: "The QR code was invented in <em>1994 by a Toyota subsidiary</em> to track car parts.", detail: "Denso Wave created it to replace barcodes — the pattern can be scanned from any angle." },
  { category: "Technology", fact: "Solar panels now cost <em>99% less</em> than they did in 1977.", detail: "The price per watt dropped from $77 to under $0.20, making solar the cheapest electricity source in history." },
  { category: "Technology", fact: "The most expensive piece of software ever written is the <em>Space Shuttle's flight software</em>.", detail: "Estimated at $500 million to develop in the 1970s, it contained 420,000 lines of near-perfect code." },
  { category: "Technology", fact: "Lithium-ion batteries lose about <em>20% of their capacity</em> after 500 full charge cycles.", detail: "This is why older smartphones and laptops hold charge for significantly less time than when new." },
  { category: "Technology", fact: "The world's first ATM was installed in <em>Barclays Bank, London in 1967</em>.", detail: "John Shepherd-Barron invented it after being locked out of his bank — the PIN was originally 6 digits but his wife said 4 was easier to remember." },
  { category: "Human Body", fact: "Your stomach acid is so strong it would <em>dissolve a razor blade</em> in under 2 hours.", detail: "The lining renews every few days specifically to protect itself from this corrosive environment." },
  { category: "Human Body", fact: "Humans are the only animals that <em>cook food</em> — and cooking likely made us who we are.", detail: "Cooked food provides more calories with less digestion, freeing energy for brain development." },
  { category: "Human Body", fact: "The human body contains about <em>37 trillion cells</em> — but replaces most of them over a lifetime.", detail: "Red blood cells live only 120 days; neurons in the cerebral cortex can last a lifetime." },
  { category: "Human Body", fact: "You share about <em>50% of your DNA</em> with a mushroom.", detail: "All eukaryotic life shares core genetic machinery inherited from a common ancestor over a billion years ago." },
  { category: "Human Body", fact: "The knee is the largest and most complex <em>joint</em> in the human body.", detail: "It combines hinge and gliding motion, supported by four ligaments, two menisci, and multiple bursae." },
  { category: "Human Body", fact: "Your brain's white matter contains about <em>150,000 km of nerve fibers</em>.", detail: "This wiring connects different brain regions — disruption of white matter causes many neurological disorders." },
  { category: "Human Body", fact: "Humans have a <em>vestigial third eyelid</em> — the pinkish fold in the corner of your eye.", detail: "The plica semilunaris is a remnant of the nictitating membrane still present in birds and reptiles." },
  { category: "Human Body", fact: "The human foot contains <em>26 bones, 33 joints, and over 100 muscles</em>.", detail: "Despite this complexity, most people never develop the full strength and flexibility their feet are capable of." },
  { category: "Human Body", fact: "Your brain generates about <em>70,000 thoughts</em> per day.", detail: "Research varies widely, but the constant background activity of the default mode network is relentless." },
  { category: "Human Body", fact: "A human hair is stronger than <em>copper wire</em> of the same diameter.", detail: "Human hair has a tensile strength comparable to aluminum — it's remarkably tough for its weight." },
  { category: "Human Body", fact: "The body's fastest growing tissue is <em>bone marrow</em> — producing 2.5 million red blood cells per second.", detail: "Without this constant production, anemia and immune failure would occur within weeks." },
  { category: "Human Body", fact: "Humans are the only animals known to have a <em>forward-facing belly button</em> as a universal trait.", detail: "The navel is a scar — its appearance varies widely based on how the umbilical cord was cut and healed." },
  { category: "Human Body", fact: "Your body's bacteria produce about <em>half a liter of gas</em> per day through digestion.", detail: "Most is absorbed or expelled — the remainder produces flatulence containing nitrogen, hydrogen, and methane." },
  { category: "Human Body", fact: "The brain's hippocampus is critical for forming <em>new memories</em> — but not for retrieving old ones.", detail: "Patient H.M., who had his hippocampus removed in 1953, could not form new memories but remembered his childhood perfectly." },
  { category: "Human Body", fact: "Muscles always work in <em>opposing pairs</em> — you cannot flex only one side of a joint alone.", detail: "When biceps contract, triceps must relax — coordination of these pairs controls all movement." },
  { category: "Human Body", fact: "The average person has about <em>100,000 hairs on their head</em>.", detail: "Blondes tend to have more (150,000), redheads fewer (90,000), and brunettes fall in between." },
  { category: "Human Body", fact: "Your body produces a new <em>complete outer layer of skin</em> roughly every month.", detail: "Dead skin cells are constantly shed — house dust is largely composed of this lost skin." },
  { category: "Human Body", fact: "Adrenaline can give people <em>superhuman strength</em> in emergencies — this is well documented.", detail: "Cases of people lifting cars off trapped individuals involve adrenaline suppressing pain and amplifying muscle output." },
  { category: "Human Body", fact: "The small intestine is about <em>6 to 7 meters long</em> — three to four times your height.", detail: "Its internal surface area, when fully unfolded, is about the size of a badminton court." },
  { category: "Human Body", fact: "Your heart creates enough pressure to <em>squirt blood 30 feet</em> if an artery were severed.", detail: "The left ventricle generates systolic pressures around 120 mmHg — significant hydraulic force." },
  { category: "Human Body", fact: "The human body contains about <em>0.2 mg of gold</em> — enough to make a tiny dot on a pin.", detail: "Most of it circulates in the blood as dissolved gold ions." },
  { category: "Food", fact: "The world's most expensive food is <em>white Alba truffle</em>, which can sell for $10,000 per kilogram.", detail: "They can only be found in specific Italian forests using trained dogs or pigs." },
  { category: "Food", fact: "Bread has been baked for at least <em>14,000 years</em> — predating agriculture.", detail: "Natufian hunter-gatherers in Jordan made flatbread from wild grains 4,000 years before farming began." },
  { category: "Food", fact: "The color of cheddar cheese is artificial — real aged cheddar is <em>white</em>.", detail: "Annatto dye has been added since the 1600s, possibly to hide quality variations in milk fat." },
  { category: "Food", fact: "Spam — the canned meat — was invented in <em>1937</em> and became critical to Allied forces in WWII.", detail: "The USSR credited Spam with helping feed the Red Army; Khrushchev later acknowledged its importance." },
  { category: "Food", fact: "The average American spends more money on <em>alcohol than vegetables</em> annually.", detail: "The USDA food spending survey consistently shows this gap, which has widened in recent decades." },
  { category: "Food", fact: "Eating carrots won't improve your eyesight unless you have a <em>vitamin A deficiency</em>.", detail: "The myth originated from WWII British propaganda to hide radar technology from the Germans." },
  { category: "Food", fact: "The 'sell by' date on food is not a safety date — it's for <em>store inventory management</em>.", detail: "Most foods are safe for days to weeks after this date if stored properly." },
  { category: "Food", fact: "The first fast food restaurant was <em>White Castle</em>, founded in 1921 in Wichita, Kansas.", detail: "It pioneered the standardized menu, uniform preparation, and multiple-location model that McDonald's later perfected." },
  { category: "Food", fact: "Saffron is so expensive partly because each flower produces only <em>three stigmas</em>.", detail: "A single kilogram requires 150,000–200,000 flowers, all hand-harvested in autumn mornings." },
  { category: "Food", fact: "Oysters can change their <em>biological sex</em> multiple times throughout their lives.", detail: "Environmental conditions including temperature and food availability trigger these sex changes." },
  { category: "Food", fact: "The oldest known recipe in the world is for <em>beer</em>, written in Sumerian about 4,000 years ago.", detail: "The Hymn to Ninkasi describes the brewing process in poetic detail — and it still works today." },
  { category: "Food", fact: "Japanese Kobe beef cattle are massaged, fed beer, and raised in low-stress environments to produce <em>extraordinary marbling</em>.", detail: "Authentic Kobe beef from Tajima cattle in Hyogo Prefecture sells for over $500 per kg." },
  { category: "Food", fact: "Coffee was discovered when an <em>Ethiopian goat herder</em> noticed his goats wouldn't sleep after eating berries.", detail: "Kaldi reportedly brought the berries to a monk, who made a drink and found it kept him alert at night prayer." },
  { category: "Food", fact: "The word 'cereal' comes from <em>Ceres</em>, the Roman goddess of agriculture and grain.", detail: "Grains have been so central to civilization that they were given divine status." },
  { category: "Food", fact: "Ice cream was once so rare and expensive it was served only to <em>royalty</em>.", detail: "In 1744, Maryland Governor William Bladen served ice cream at a dinner party — guests wrote about it in awe." },
  { category: "Food", fact: "The hottest chili in the world — <em>Pepper X</em> — measures 3.18 million Scoville units.", detail: "Created by Ed Curlin 2023, it's so hot that eating it requires medical supervision." },
  { category: "Food", fact: "Pistachios can spontaneously <em>combust</em> in large quantities due to self-heating oils.", detail: "Shipping regulations require ventilation for pistachio containers due to this fire risk." },
  { category: "Food", fact: "The average chocolate bar contains <em>8 insect parts</em> — the FDA permits up to 60.", detail: "Insect fragments are an unavoidable byproduct of harvesting and processing cacao." },
  { category: "Food", fact: "Salt was once so valuable it was used to <em>pay Roman soldiers</em> — the origin of the word 'salary'.", detail: "Only pure, reliable workers were said to be 'worth their salt.'" },
  { category: "Food", fact: "The pumpkin is technically a <em>fruit</em> — a berry in botanical terms, even.", detail: "It develops from the flower's ovary and contains seeds, meeting the botanical definition of a fruit." },
  { category: "Nature", fact: "The baobab tree can store up to <em>120,000 liters of water</em> in its swollen trunk.", detail: "African elephants gouge the bark with their tusks to reach the moisture inside during droughts." },
  { category: "Nature", fact: "Some species of coral can <em>survive out of water for up to 12 hours</em> during low tide.", detail: "These intertidal corals have developed heat and desiccation resistance mechanisms." },
  { category: "Nature", fact: "The electric eel generates enough charge to <em>jump out of water</em> to shock threats.", detail: "Vanderbilt researcher Ken Catania documented this behavior in 2016 — Volta himself reportedly observed it." },
  { category: "Nature", fact: "Sinkholes can form in minutes — a Florida one in 2013 swallowed a man <em>while he slept</em>.", detail: "Underground caverns dissolve as water erodes limestone, creating voids that collapse suddenly." },
  { category: "Nature", fact: "There are places in Antarctica where it has <em>never rained in recorded history</em>.", detail: "The McMurdo Dry Valleys are the driest places on Earth — sometimes compared to Mars in conditions." },
  { category: "Nature", fact: "A single mature tree removes about <em>48 pounds of CO2</em> from the air each year.", detail: "Urban trees also reduce city temperatures, manage stormwater, and reduce energy costs." },
  { category: "Nature", fact: "The aurora borealis occurs when solar particles collide with <em>oxygen and nitrogen in the atmosphere</em>.", detail: "Green comes from oxygen at 60 miles up; red from oxygen at 200 miles; blue and purple from nitrogen." },
  { category: "Nature", fact: "Some types of coral glow <em>fluorescent</em> when illuminated by blue light.", detail: "Scientists are studying this fluorescence — it may help corals survive stress and bleaching events." },
  { category: "Nature", fact: "The deepest roots ever recorded reached <em>60 meters below the surface</em> in South Africa.", detail: "Wild fig tree roots in Echo Caves found groundwater at extraordinary depth through rock crevices." },
  { category: "Nature", fact: "Tornado Alley in the US experiences more tornadoes than <em>anywhere else on Earth</em>.", detail: "The collision of warm, moist Gulf air with cold, dry Arctic air creates ideal conditions." },
  { category: "Nature", fact: "The world's largest flower cluster belongs to the <em>Amorphophallus titanum</em> — also known as the corpse flower.", detail: "Its bloom heats itself to body temperature to spread the smell of rotting flesh across a wider area." },
  { category: "Nature", fact: "The Permian mass extinction wiped out about <em>96% of all marine species</em> 252 million years ago.", detail: "Known as 'The Great Dying,' it was by far the most severe extinction event in Earth's history." },
  { category: "Nature", fact: "Some mountains are still <em>rebounding</em> from the weight of glaciers that melted 10,000 years ago.", detail: "Scandinavia is rising at about 1 cm per year in a process called isostatic rebound." },
  { category: "Nature", fact: "The Himalayan jumping spider lives higher than any other animal — at <em>6,700 meters</em> on Everest's slopes.", detail: "It feeds on tiny insects blown up by wind currents from lower elevations." },
  { category: "Nature", fact: "Antarctica was once covered in <em>tropical rainforest</em> about 52 million years ago.", detail: "Fossilized palm fronds and tropical plants have been found on the continent." },
  { category: "Nature", fact: "Rivers in flood carry more sediment in a single day than in <em>centuries of normal flow</em>.", detail: "This is why floodplains are the world's most fertile agricultural land." },
  { category: "Nature", fact: "The surface of the ocean is covered by a <em>biological film</em> called the sea surface microlayer.", detail: "This thin layer is home to unique microbial communities and plays a role in gas exchange with the atmosphere." },
  { category: "Nature", fact: "In certain caves, stalactites and stalagmites grow only about <em>1 cm every 100 years</em>.", detail: "Large formations can therefore be tens of thousands of years old." },
  { category: "Nature", fact: "The mangrove tree can survive in saltwater by <em>filtering salt</em> through its roots.", detail: "Some species excrete salt through their leaves — you can taste it if you lick them." },
  { category: "Psychology", fact: "The <em>Dunning-Kruger effect</em> describes how people with low ability overestimate their competence.", detail: "Conversely, highly skilled people often underestimate themselves because they assume tasks are easy for everyone." },
  { category: "Psychology", fact: "Humans use about <em>100% of their brains</em> — the '10% myth' has no scientific basis.", detail: "Different regions activate for different tasks, but no significant portion remains permanently unused." },
  { category: "Psychology", fact: "People who are <em>bilingual</em> develop Alzheimer's an average of 4–5 years later than monolingual speakers.", detail: "Managing two language systems appears to build cognitive reserve that delays dementia onset." },
  { category: "Psychology", fact: "The feeling of nostalgia actually <em>raises your physical temperature</em>.", detail: "Studies show subjects felt literally warmer when induced to feel nostalgic — it may have evolved as a social comfort." },
  { category: "Psychology", fact: "Humans are <em>surprisingly bad</em> at detecting lies — no better than random chance on average.", detail: "Professional interrogators and security personnel are also poor at it, despite confidence to the contrary." },
  { category: "Psychology", fact: "The <em>Mozart Effect</em> — the idea that classical music makes babies smarter — is largely a myth.", detail: "The original study showed a brief spatial reasoning improvement in adults; it was never replicated in infants." },
  { category: "Psychology", fact: "Sleep deprivation produces <em>effects similar to being drunk</em> on cognitive performance.", detail: "After 17–19 hours awake, performance degrades to a level equivalent to a 0.05% blood alcohol level." },
  { category: "Psychology", fact: "Humans have an innate fear of <em>two things</em> at birth — loud noises and falling.", detail: "All other fears, including spiders and snakes, are learned through experience or culture." },
  { category: "Psychology", fact: "The average person has about <em>12,000 to 60,000 thoughts per day</em>, 80% of which are negative.", detail: "This negativity bias served survival but can be counterproductive in modern safe environments." },
  { category: "Psychology", fact: "Smiling — even forced smiling — actually <em>improves your mood</em> through facial feedback.", detail: "The muscles used for smiling send signals to the brain that trigger positive emotional states." },
  { category: "Mathematics", fact: "There are more grains of sand on Earth than <em>seconds that have passed since the Big Bang</em>.", detail: "The Earth has an estimated 7.5 x 10^18 grains; the Big Bang was only 4.3 x 10^17 seconds ago." },
  { category: "Mathematics", fact: "The number 1 is not considered <em>prime</em> — by mathematical convention.", detail: "Primality requires exactly two distinct divisors; 1 has only one. This preserves the Fundamental Theorem of Arithmetic." },
  { category: "Mathematics", fact: "Euler's identity — e^(iπ) + 1 = 0 — combines five of the most important numbers in mathematics.", detail: "It links <em>e, i, π, 1, and 0</em> in a single elegant equation, called the most beautiful in math." },
  { category: "Mathematics", fact: "A fractal is a shape with the same <em>complexity at any level of zoom</em>.", detail: "Coastlines, snowflakes, and broccoli are natural fractals — they have fractional dimensions." },
  { category: "Mathematics", fact: "The word <em>'algorithm'</em> comes from the name of 9th-century Persian mathematician al-Khwarizmi.", detail: "His book also gave us the word 'algebra' — from 'al-jabr' meaning 'completion of broken parts.'" },
  { category: "Mathematics", fact: "Zero was independently <em>invented multiple times</em> in different civilizations.", detail: "The Maya, Babylonians, and Indian mathematicians all developed zero — but Indian mathematicians formalized it." },
  { category: "Mathematics", fact: "Prime numbers become <em>less frequent</em> the higher you count, but never stop.", detail: "Euclid proved the infinitude of primes around 300 BC — it remains one of mathematics' most elegant proofs." },
  { category: "Linguistics", fact: "The language with the most <em>grammatical cases</em> is Hungarian with 18.", detail: "Cases mark the relationship between nouns and other elements — English has just 3 pronouns-based cases." },
  { category: "Linguistics", fact: "The click languages of southern Africa use <em>clicks as consonants</em> — entirely unlike any other language family.", detail: "The !Kung language has 141 distinct phonemes, the most of any known language." },
  { category: "Linguistics", fact: "English is the only language that <em>capitalizes the first-person singular pronoun</em> 'I'.", detail: "This may have started as a scribal convention — a single lowercase 'i' was easy to lose on the page." },
  { category: "Linguistics", fact: "The Finnish word for 'soap opera' is <em>'saippuasinkki'</em> and the longest palindrome in any language.", detail: "It means 'soap sink' and reads the same forwards and backwards." },
  { category: "Linguistics", fact: "There is a tribe in the Amazon whose language has <em>no words for numbers</em> beyond one and two.", detail: "The Piraha people of Brazil reportedly have no concept of counting beyond pairs." },
  { category: "Linguistics", fact: "The phrase <em>'the quick brown fox jumps over the lazy dog'</em> uses every letter of the alphabet.", detail: "Such sentences are called pangrams — typists and font designers use them to test keyboards." },
  { category: "Art & Music", fact: "Stradivarius violins are so acoustically superior that scientists have been <em>trying to replicate the formula for centuries</em>.", detail: "Recent research suggests the wood's unique properties came from a Little Ice Age that made trees grow slower and denser." },
  { category: "Art & Music", fact: "The Louvre in Paris is so large that if you spent <em>30 seconds on each artwork</em>, it would take 100 days to see everything.", detail: "It contains over 380,000 objects, of which 35,000 are on display at any time." },
  { category: "Art & Music", fact: "Van Gogh only sold <em>one painting</em> during his lifetime — The Red Vineyard.", detail: "He produced over 900 paintings; today his works sell for hundreds of millions of dollars." },
  { category: "Art & Music", fact: "The first music video was made by <em>Queen in 1975</em> for Bohemian Rhapsody.", detail: "It was created so the band could avoid lip-syncing on TV shows — and changed the music industry." },
  { category: "Art & Music", fact: "Ancient Greeks built their theaters with such precise acoustics that a <em>coin dropped on stage</em> could be heard in the back row.", detail: "The theater at Epidaurus, built in 340 BC, still has remarkable acoustic properties today." },
  { category: "Art & Music", fact: "The longest piece of music ever written is <em>Organ²/ASLSP</em> by John Cage — it lasts 639 years.", detail: "It began in 2001 in a German church; the next chord change occurs in 2040." },
  { category: "Art & Music", fact: "Pablo Picasso was questioned by police after the <em>Mona Lisa was stolen</em> in 1911.", detail: "He was released, having nothing to do with it — the thief was an Italian handyman who worked at the Louvre." },
  { category: "Art & Music", fact: "The Hollywood sign originally said <em>'Hollywoodland'</em> and advertised a housing development.", detail: "The last four letters rotted and were removed in 1949 — the sign became a permanent landmark." },
  { category: "Art & Music", fact: "Michelangelo's David was <em>nearly destroyed</em> when rioters threw a bench at it in 1527.", detail: "The original lost its left arm in three pieces; they were later repaired." },
  { category: "Economics", fact: "The global shadow economy — including unreported and illegal activity — represents about <em>25% of world GDP</em>.", detail: "In some developing nations, the informal economy exceeds 50% of all economic activity." },
  { category: "Economics", fact: "Warren Buffett made <em>99% of his wealth after age 52</em>.", detail: "His fortune is a testament to compound interest — he's said it is the eighth wonder of the world." },
  { category: "Economics", fact: "The average American household throws away about <em>$1,500 worth of food</em> per year.", detail: "The US wastes about 30–40% of its food supply — one of the highest rates in the world." },
  { category: "Economics", fact: "IKEA is responsible for about <em>1% of the world's commercial wood consumption</em>.", detail: "It sources timber from over 50 countries and has become one of the world's largest wood buyers." },
  { category: "Economics", fact: "The global pet industry is worth over <em>$250 billion</em> annually.", detail: "Americans alone spend more on pets than most countries spend on healthcare." },
  { category: "Economics", fact: "The richest 1% of people own more wealth than the <em>bottom 50% combined</em>.", detail: "Global wealth inequality has grown consistently since the 1980s across almost every measure." },
  { category: "Economics", fact: "Apple's market capitalization has at times <em>exceeded the GDP of most countries</em>.", detail: "When Apple hit $3 trillion in 2023, only the US, China, Japan, and Germany had larger GDPs." },
  { category: "Mythology", fact: "The word <em>'volcano'</em> comes from Vulcan, the Roman god of fire and forge.", detail: "The Romans named it after the fiery island Vulcano near Sicily, believed to be Vulcan's workshop." },
  { category: "Mythology", fact: "Norse mythology predicted a final battle called <em>Ragnarok</em> where most gods would die.", detail: "Scholars note striking parallels between Ragnarok and the climate crisis following the 536 AD volcanic winter." },
  { category: "Philosophy", fact: "The Ship of Theseus paradox asks whether something <em>replaced piece by piece</em> remains the same thing.", detail: "It applies today to cells, identity, and even digital file copies — still unresolved after 2,000 years." },
  { category: "Philosophy", fact: "René Descartes' famous phrase <em>'I think, therefore I am'</em> was meant to establish the minimum certain knowledge.", detail: "He doubted everything until he realized the act of doubting proved a doubter must exist." },
  { category: "Medicine", fact: "Aspirin was one of the first modern drugs and is still one of the <em>most prescribed</em> in the world.", detail: "It was formally synthesized in 1897 but willow bark — its source compound — has been used for 3,500 years." },
  { category: "Medicine", fact: "The appendix's official function remained unknown for centuries — but it may store <em>gut bacteria reserves</em> after illness.", detail: "Surgically removing it appears to have no negative long-term health consequences in most people." },
  { category: "Medicine", fact: "Blood types were only discovered in <em>1901</em> by Karl Landsteiner.", detail: "Before then, blood transfusions were tried randomly — often with fatal results from incompatibility." },
  { category: "Medicine", fact: "Penicillin's discovery accidentally saved an estimated <em>200 million lives</em>.", detail: "It's widely considered the most important accidental discovery in the history of medicine." },
  { category: "Medicine", fact: "The human body can survive the removal of one kidney, one lung, one eye, <em>and 75% of the liver</em>.", detail: "The liver's regenerative capacity is extraordinary — it can regrow to full size within weeks." },
  { category: "Medicine", fact: "Cholera was traced to contaminated water in 1854 by John Snow — establishing the <em>germ theory of disease</em>.", detail: "Snow's map of cholera cases around a Soho water pump is an iconic moment in epidemiology." },
  { category: "Astronomy", fact: "The observable universe is about <em>93 billion light-years in diameter</em>.", detail: "Despite being only 13.8 billion years old, expansion has stretched space far beyond what light has had time to cross." },
  { category: "Astronomy", fact: "There are more galaxies in the observable universe than there are <em>grains of sand on Earth</em>.", detail: "Recent estimates put the galaxy count at 2 trillion — far more than the previous estimate of 200 billion." },
  { category: "Astronomy", fact: "A light year is not a unit of time — it's the distance light travels in one year: about <em>9.46 trillion km</em>.", detail: "The nearest star system, Alpha Centauri, is 4.37 light years — over 41 trillion km away." },
  { category: "Astronomy", fact: "The Sun's core is about <em>15 million degrees Celsius</em>.", detail: "At this temperature and pressure, hydrogen nuclei fuse into helium, releasing the energy that heats Earth." },
  { category: "Astronomy", fact: "Every element heavier than iron was created in a <em>supernova explosion</em>.", detail: "Gold, silver, uranium, and other heavy elements are forged in the violence of dying stars." },
  { category: "Astronomy", fact: "The universe has no <em>center</em> — every point appears to be at the center of expansion.", detail: "This is a key feature of the Big Bang — space itself expanded; there was no central explosion point." },
  { category: "Animals", fact: "The horseshoe crab's <em>blue blood</em> is used to test every injectable drug and vaccine for contamination.", detail: "Its blood clots around bacterial toxins — a property so valuable that the species is harvested and released alive." },
  { category: "Animals", fact: "The tardigrade can survive in the <em>vacuum of outer space</em> for days in a state called cryptobiosis.", detail: "It was the first animal confirmed to survive direct exposure to the vacuum and radiation of space." },
  { category: "Animals", fact: "Lobsters don't age the way most animals do — they show <em>no signs of aging</em> and could theoretically live forever.", detail: "They die mainly from exhaustion during molting, predation, or injury — not biological aging." },
  { category: "Animals", fact: "The manta ray has the largest brain-to-body ratio of <em>any fish</em>.", detail: "They're known to approach divers for interaction and may recognize individual humans." },
  { category: "Animals", fact: "Penguins have a <em>supraorbital gland</em> above their eyes that filters salt from seawater.", detail: "This lets them drink seawater — essential for survival in their marine environment." },
  { category: "Animals", fact: "A group of cats living together is called a <em>colony</em> or clowder.", detail: "Feral cat colonies are matriarchal — related females share kitten-raising duties cooperatively." },
  { category: "Animals", fact: "The aye-aye — a nocturnal primate from Madagascar — is considered an <em>omen of death</em> by locals.", detail: "It finds insect larvae by tapping wood and listening, then extracting them with an elongated middle finger." },
  { category: "Animals", fact: "Moose are such strong swimmers they can dive to depths of <em>5.5 meters</em> to feed on aquatic plants.", detail: "They can swim for miles and are surprisingly fast in water despite their ungainly land appearance." },
  { category: "Animals", fact: "The mudskipper is a fish that <em>walks on land</em> and spends more time out of water than in it.", detail: "It can breathe through its skin and uses its pectoral fins as crutches to move across mudflats." },
  { category: "Animals", fact: "Great white sharks have been alive as a species for over <em>16 million years</em>.", detail: "They predate the Himalayas, which only reached their current height about 10 million years ago." },
  { category: "Animals", fact: "The cassowary is considered the world's most <em>dangerous bird</em> — capable of killing with a single kick.", detail: "It's the third-tallest and second-heaviest bird on Earth, standing up to 1.8 m tall." },
  { category: "Animals", fact: "Flies taste food before they land on it using <em>chemoreceptors on their feet</em>.", detail: "Their taste sensitivity is about 10 million times greater than that of human tongues." },
  { category: "Animals", fact: "The longest-lived land animal was Jonathan, a <em>Seychelles giant tortoise</em> who lived to at least 192.", detail: "He hatched around 1832 and was still alive at the time of writing, living on Saint Helena island." },
  { category: "Animals", fact: "Salmon return to the exact <em>stream they were born in</em> to spawn — sometimes years later.", detail: "They navigate thousands of miles using smell, Earth's magnetic field, and the Sun." },
  { category: "Animals", fact: "The Venus flytrap is native to only a <em>100-mile radius</em> of Wilmington, North Carolina.", detail: "Despite being sold worldwide as a novelty plant, it's endangered in its tiny natural habitat." },
  { category: "Animals", fact: "A group of bats is called a <em>colony</em> when roosting and a 'cloud' when in flight.", detail: "The world's largest bat colony — at Bracken Cave, Texas — contains up to 20 million Mexican free-tailed bats." },
  { category: "Animals", fact: "Elephants show altruistic behavior — they've been documented helping <em>other species</em> in distress.", detail: "Rescues of other elephants, and even humans and other animals from mud pits, have been recorded." },
  { category: "Animals", fact: "The electric fish, Electrophorus voltai, can produce shocks of over <em>860 volts</em> — the highest of any living animal.", detail: "Scientists discovered this Amazonian species produces nearly double the voltage of the common electric eel." },
  { category: "Animals", fact: "Dragonflies existed before the dinosaurs — some prehistoric species had wingspans of <em>75 cm</em>.", detail: "Meganeura, a dragonfly-like insect from 300 million years ago, was the largest flying insect in history." },
  { category: "Animals", fact: "The migratory locust can form swarms of up to <em>80 million insects per km2</em>.", detail: "A large swarm can consume as much food in a day as 35,000 people." },
  { category: "Space", fact: "The Parker Solar Probe, launched in 2018, is the <em>fastest human-made object ever</em>.", detail: "It's designed to fly within 6.1 million km of the Sun's surface at 692,000 km/h." },
  { category: "Space", fact: "Exoplanets — planets orbiting other stars — were first confirmed in <em>1992</em>.", detail: "Over 5,500 have now been confirmed, and astronomers estimate there are billions in the Milky Way alone." },
  { category: "Space", fact: "The universe contains roughly <em>2 trillion galaxies</em> in the observable portion.", detail: "Each galaxy contains hundreds of billions of stars — the sheer scale is incomprehensible." },
  { category: "Space", fact: "Astronauts on the ISS must exercise <em>2 hours every day</em> to prevent muscle and bone loss.", detail: "Without gravity, muscles atrophy and bones lose density at an accelerated rate in microgravity." },
  { category: "Space", fact: "The Sun will eventually expand into a <em>red giant</em> and likely engulf Earth in 5 billion years.", detail: "Before then, increasing luminosity will make Earth's oceans evaporate in about 1 billion years." },
  { category: "Space", fact: "The Hubble Space Telescope was initially <em>useless</em> due to a manufacturing error in its mirror.", detail: "A $1.5 billion servicing mission in 1993 installed corrective optics — essentially glasses for the telescope." },
  { category: "Space", fact: "Mars has seasons like Earth because its axis is tilted about <em>25 degrees</em> — nearly identical to Earth's 23.4.", detail: "However, Mars's orbit is more elliptical, making its seasons unequal in length." },
  { category: "Space", fact: "The first spacewalk lasted only <em>12 minutes</em> but almost killed the cosmonaut.", detail: "Alexei Leonov's spacesuit ballooned so much in vacuum that he had to partially deflate it to re-enter the airlock." },
  { category: "Space", fact: "There is a cloud of <em>alcohol in deep space</em> — Sagittarius B2 contains ethyl alcohol spanning 1,000 AU.", detail: "It contains enough alcohol to fill 400 trillion trillion pints of beer." },
  { category: "Space", fact: "The Sun orbits the center of the Milky Way at about <em>828,000 km/h</em>.", detail: "It takes about 225–250 million years to complete one orbit — a 'Galactic Year.'" },
  { category: "History", fact: "The first computers were entirely <em>human</em> — the word described people who performed calculations.", detail: "NASA employed rooms full of human computers before electronic machines replaced them in the 1960s." },
  { category: "History", fact: "Ancient Egyptian workers who built the pyramids were paid in <em>beer</em> — about 4 to 5 liters per day.", detail: "Beer was a dietary staple and safer to drink than water in ancient Egypt." },
  { category: "History", fact: "The Great Plague of Athens in 430 BC may have actually been <em>typhoid fever</em> — not the plague.", detail: "The epidemic killed up to one-third of Athens's population including the leader Pericles." },
  { category: "History", fact: "The Chinese invented <em>gunpowder</em> while trying to make an immortality potion.", detail: "Taoist alchemists mixing sulfur, charcoal, and saltpeter in the 9th century stumbled onto the explosive mixture." },
  { category: "History", fact: "The Library of Congress in Washington is the largest library in the world with <em>170 million items</em>.", detail: "It receives about 15,000 new items per day under US copyright law's legal deposit requirement." },
  { category: "History", fact: "The Battle of Waterloo was partly lost by Napoleon because he had <em>hemorrhoids</em>.", detail: "Historians suggest his painful condition prevented him from riding to survey the battlefield personally." },
  { category: "History", fact: "The Bubonic Plague bacteria — Yersinia pestis — still exists and causes <em>a handful of cases per year</em> in the US.", detail: "Most cases are in the American Southwest and are easily treated with modern antibiotics." },
  { category: "History", fact: "Isaac Newton spent more time on <em>alchemy and theology</em> than on physics and math.", detail: "His unpublished theological and alchemical manuscripts vastly outnumber his scientific writings." },
  { category: "History", fact: "The first flushing toilet was invented by <em>John Harington</em> in 1596 for Queen Elizabeth I.", detail: "She reportedly loved it but was embarrassed to use it because it was too noisy." },
  { category: "History", fact: "Ancient Olympic athletes competed in the <em>nude</em>.", detail: "The Greek word 'gymnasium' comes from 'gymnos' meaning naked — training was done without clothes." },
  { category: "History", fact: "Albert Einstein failed his <em>university entrance exam</em> on the first attempt.", detail: "He failed the language and botany sections but excelled in math and physics." },
  { category: "History", fact: "The first person convicted of speeding in a car served <em>two days in jail</em> in 1896.", detail: "Walter Arnold was doing 8 mph in a 2 mph zone — caught by a policeman on a bicycle." },
  { category: "History", fact: "Charles Darwin proposed the theory of evolution in 1859 but sat on his findings for <em>20 years</em> out of fear.", detail: "He only published On the Origin of Species when he learned Alfred Russel Wallace had reached the same conclusions." },
  { category: "History", fact: "The oldest university still in operation is the <em>University of Bologna</em>, founded in 1088.", detail: "It predates Oxford by at least 100 years and Cambridge by 200." },
  { category: "Science", fact: "The total weight of all ants on Earth roughly equals the <em>total weight of all humans</em>.", detail: "There are approximately 20 quadrillion ants alive at any time, each weighing very little individually." },
  { category: "Science", fact: "The standard model of particle physics describes <em>17 fundamental particles</em>.", detail: "The last to be discovered was the Higgs boson in 2012 at CERN's Large Hadron Collider." },
  { category: "Science", fact: "Ice floats on water because it's less dense than liquid water — a property <em>unusual for solids</em>.", detail: "This anomaly makes aquatic life possible — ice insulates rather than freezing lakes solid from bottom to top." },
  { category: "Science", fact: "The probability of your exact existence is approximately <em>1 in 10^2,685,000</em>.", detail: "Every genetic event and ancestor meeting required for you to exist makes your existence astronomically improbable." },
  { category: "Science", fact: "Sharks have been on Earth so long they predate not just dinosaurs but <em>trees</em> by 90 million years.", detail: "The first trees evolved about 360 million years ago; sharks date to at least 450 million years." },
  { category: "Science", fact: "Humans are technically <em>star stuff</em> — every atom in your body was forged in a star.", detail: "Carl Sagan popularized this fact: iron in your blood, calcium in your bones — all made in stellar cores." },
  { category: "Science", fact: "The Voyager probes are now so far away that a radio signal takes over <em>22 hours</em> to reach them.", detail: "NASA still communicates with both Voyagers using the Deep Space Network's massive dish antennae." },
  { category: "Science", fact: "There are more microbial cells in your gut than <em>stars in the Milky Way</em>.", detail: "The gut microbiome contains trillions of bacteria that influence immunity, mood, and metabolism." },
  { category: "Science", fact: "Bamboo is not only the fastest-growing plant but also one of the <em>strongest materials by weight</em>.", detail: "Its tensile strength rivals steel cables — traditional bamboo scaffolding is used on skyscrapers in Asia." },
  { category: "Science", fact: "The mantis shrimp sees colors in the <em>ultraviolet and infrared</em> spectrum beyond human vision.", detail: "Its 16 photoreceptors can detect polarized light — a feature being studied for cancer detection." },
  { category: "Nature", fact: "The Amazon River basin contains about <em>10% of all species on Earth</em>.", detail: "It's estimated that a new species is discovered in the Amazon every 3 days on average." },
  { category: "Nature", fact: "There are more possible arrangements of a standard <em>deck of cards than there are atoms in the observable universe</em>.", detail: "52! is approximately 8x10^67 — every shuffle in history has almost certainly produced a unique order." },
  { category: "Nature", fact: "Some species of <em>trees communicate distress signals</em> that attract the predators of insects attacking them.", detail: "When caterpillars eat oak leaves, the tree releases chemicals that attract parasitic wasps targeting caterpillars." },
  { category: "Nature", fact: "The combined biomass of <em>all viruses on Earth</em> exceeds the combined mass of all humans by 100 times.", detail: "Viruses are the most abundant biological entities on Earth, found in every ecosystem." },
  { category: "Nature", fact: "Mount Vesuvius erupts on average every <em>20 years</em> — its last eruption was in 1944.", detail: "With 3 million people living in its shadow, it's considered one of the world's most dangerous volcanoes." },
  { category: "Nature", fact: "The Blue Marble photograph of Earth taken by Apollo 17 in 1972 is the <em>most reproduced photo in history</em>.", detail: "It's the first full-disk photo of Earth and helped launch the modern environmental movement." },
  { category: "Nature", fact: "A single gram of soil can contain up to <em>100 million bacterial cells</em> from thousands of species.", detail: "Most soil bacteria remain uncultured in labs — we know little about the vast majority." },
  { category: "Nature", fact: "The Pacific Ring of Fire accounts for about <em>90% of the world's earthquakes</em>.", detail: "It encircles the Pacific Ocean and is the site of about 75% of all active volcanoes." },
  { category: "Nature", fact: "Permafrost covers about <em>25% of the Northern Hemisphere's land surface</em>.", detail: "As it thaws, it releases stored carbon dioxide and methane — potentially accelerating climate change." },
  { category: "Human Body", fact: "The retina processes visual information so fast it can detect a <em>single photon of light</em>.", detail: "The human eye is more sensitive in complete darkness than any current camera sensor." },
  { category: "Human Body", fact: "Your heartbeat synchronizes with <em>music</em> — fast music speeds it up, slow music slows it down.", detail: "This physiological entrainment is why music is so effective at altering mood and arousal." },
  { category: "Human Body", fact: "The body replaces the <em>lining of the intestines</em> every 2 to 4 days.", detail: "This constant renewal prevents buildup of damage from digestive acids and food friction." },
  { category: "Human Body", fact: "Humans are the only animals known to <em>cook food</em> — and cooking likely drove brain expansion.", detail: "Cooking increases caloric yield by breaking down cell walls and denaturing proteins before digestion." },
  { category: "Human Body", fact: "The enamel on your teeth is the <em>hardest substance your body produces</em>.", detail: "It's primarily hydroxyapatite, a crystalline calcium phosphate that rates 5 on the Mohs hardness scale." },
  { category: "Human Body", fact: "About 1 in 2,000 people are born with a condition called <em>tetrachromacy</em> — four types of cone cells instead of three.", detail: "Most are women, and they can distinguish colors in a range invisible to other humans." },
  { category: "Human Body", fact: "The human brain can recognize a familiar face in <em>under 100 milliseconds</em>.", detail: "Face recognition activates a dedicated brain region — the fusiform face area — almost instantly." },
  { category: "Human Body", fact: "Your body naturally produces a small amount of <em>DMT</em> — a powerful psychedelic compound.", detail: "Its role in the body is not fully understood but it's present in the lungs and elsewhere." },
  { category: "Human Body", fact: "Humans are one of the few animals that can get <em>sunburned</em>.", detail: "Our loss of body hair during evolution exposed skin to UV — we compensate with melanin and cultural protection." },
  { category: "Human Body", fact: "The nervous system can transmit signals at up to <em>120 meters per second</em>.", detail: "Myelinated nerve fibers conduct impulses at this speed; unmyelinated fibers are far slower at 0.5–2 m/s." },
  { category: "Food", fact: "The tomato plant is actually <em>toxic</em> — only the fruit is safe to eat.", detail: "Tomato leaves and stems contain tomatine and solanine, which are toxic alkaloids." },
  { category: "Food", fact: "The first recorded recipe for <em>chocolate chip cookies</em> was published in 1938 by Ruth Wakefield.", detail: "She invented them at the Toll House Inn — Nestle later bought the rights and put the recipe on their chips." },
  { category: "Food", fact: "Peppers don't actually burn you — capsaicin <em>tricks your nervous system</em> into thinking it's hot.", detail: "The compound binds to TRPV1 receptors which normally detect actual heat above 43 degrees C." },
  { category: "Food", fact: "The word <em>'ketchup'</em> comes from the Chinese 'kê-tsiap' — a fermented fish sauce.", detail: "The original Asian sauce had no tomatoes; tomatoes weren't added until American versions evolved in the 1800s." },
  { category: "Food", fact: "Scientists have found a way to make <em>chocolate that doesn't melt</em> up to 40 degrees C.", detail: "Cadbury developed this heat-resistant chocolate specifically for tropical market distribution." },
  { category: "Food", fact: "A single cup of coffee contains <em>over 1,000 distinct chemical compounds</em>.", detail: "Only about 30 of these have been well studied — coffee's full chemical complexity remains unknown." },
  { category: "Food", fact: "The fear of running out of wine has an actual name — <em>oenophobia</em> — though it usually means fear of wine.", detail: "True oenophobia is a fear of wine; the fear of running out is sometimes called 'empty bottle anxiety.'" },
  { category: "Food", fact: "Anchovies were used as a <em>currency</em> in parts of medieval Europe.", detail: "Their high protein content and long shelf life made them extremely valuable trade goods." },
  { category: "Food", fact: "The first <em>vending machine</em> in the US dispensed chewing gum on New York City train platforms in 1888.", detail: "Adams Gum Company installed them at the el train stations as a convenience for commuters." },
  { category: "Food", fact: "A single teaspoon of <em>pure cinnamon</em> can cause choking and serious lung inflammation.", detail: "The 'Cinnamon Challenge' sent hundreds to hospitals — dry, fine spices expand rapidly in airways." },
  { category: "Geography", fact: "The largest country in the world with no river is <em>Saudi Arabia</em>.", detail: "It relies on desalination plants and groundwater from ancient aquifers for freshwater." },
  { category: "Geography", fact: "Approximately <em>half the world's population</em> lives within a circle covering just 16% of Earth's surface.", detail: "This circle, centered on eastern Asia, contains billions due to the dense populations of China and India." },
  { category: "Geography", fact: "The Amazon River basin is so large it would cover the <em>entire contiguous United States</em>.", detail: "It spans about 7.4 million km2 and contains about 20% of the world's river water." },
  { category: "Geography", fact: "Antarctica is technically a <em>desert</em> and a continent, but also the world's largest freshwater reserve.", detail: "The ice sheet contains 70% of Earth's freshwater — enough to raise sea levels by 58 meters if it melted." },
  { category: "Geography", fact: "The Bermuda Triangle has <em>no statistically higher rate</em> of ship or aircraft disappearances than other ocean areas.", detail: "Lloyd's of London doesn't charge higher insurance premiums for ships traveling through it." },
  { category: "Geography", fact: "China has only <em>one official time zone</em> despite spanning 5 geographical zones.", detail: "The country uses Beijing Standard Time throughout, creating unusual sunrise and sunset times in the west." },
  { category: "Geography", fact: "Australia is the <em>only country that is also a continent</em>.", detail: "It is also the world's largest island and occupies its own continental plate." },
  { category: "Geography", fact: "The International Date Line is not straight — it zigzags to avoid <em>splitting countries and island groups</em>.", detail: "If the line were straight, some nations would span two different calendar days." },
  { category: "Technology", fact: "The global positioning system (GPS) requires <em>at least 24 satellites</em> to function globally.", detail: "The US maintains 31 operational GPS satellites — more than the minimum for redundancy." },
  { category: "Technology", fact: "The first digital camera was invented by <em>Kodak engineer Steve Sasson</em> in 1975.", detail: "It weighed 3.6 kg, took 23 seconds to capture an image, and stored it on a cassette tape." },
  { category: "Technology", fact: "Facebook's original name was <em>TheFacebook.com</em> — it launched in Mark Zuckerberg's dorm room.", detail: "He paid $200,000 in 2005 to acquire the facebook.com domain from a company called AboutFace." },
  { category: "Technology", fact: "The 'cloud' is not in the sky — it's a network of <em>physical data centers</em> around the world.", detail: "Global data center power consumption rivals that of entire countries like Australia or the UK." },
  { category: "Technology", fact: "Zoom went from 10 million to <em>300 million daily users</em> in three months in early 2020.", detail: "The COVID-19 pandemic created the largest and fastest adoption of any communication technology in history." },
  { category: "Technology", fact: "The original Super Mario Bros was so large it had to use <em>data compression techniques</em> never used before.", detail: "Nintendo engineers invented new compression methods to fit the game into a 40-kilobyte cartridge." },
  { category: "Technology", fact: "Google processes about <em>8.5 billion searches per day</em> — roughly 99,000 every second.", detail: "Despite this, Google claims its servers consume less energy per search than boiling a kettle for one second." },
  { category: "Technology", fact: "The USB logo's <em>three prongs</em> represent different protocols — serial, parallel, and keyboard.", detail: "The trident design was chosen to represent versatility in a single universal connector." },
  { category: "Technology", fact: "SpaceX's Falcon 9 rocket can land on a drone ship at sea — an engineering feat requiring <em>autonomous AI landing</em>.", detail: "The rocket must slow from hypersonic speed to a perfect hover using engines and grid fins." },
  { category: "Technology", fact: "The first mobile phone call was made on <em>April 3, 1973</em> by Motorola's Martin Cooper.", detail: "He called Joel Engel at Bell Labs to announce the competition had just made a mobile phone call." },
  { category: "Psychology", fact: "People are more likely to help someone they've already <em>done a favor for</em> — the Ben Franklin Effect.", detail: "Franklin manipulated a rival by asking to borrow a book — the rival liked him more afterward." },
  { category: "Psychology", fact: "Reading fiction improves <em>real-world empathy</em> by exercising the brain's social simulation systems.", detail: "Studies show regular fiction readers score higher on empathy tests than non-fiction readers." },
  { category: "Psychology", fact: "The <em>mere exposure effect</em> means we like things more simply by seeing them repeatedly.", detail: "Advertisers exploit this — even neutral or slightly negative ads increase preference through familiarity." },
  { category: "Psychology", fact: "Groups make <em>riskier decisions</em> than individuals — a phenomenon called risky shift.", detail: "Shared responsibility in groups diffuses accountability, leading to bolder collective choices." },
  { category: "Psychology", fact: "Nostalgia was once classified as a <em>medical disease</em> — Swiss physicians diagnosed it in soldiers.", detail: "In the 17th–18th centuries, extreme homesickness was considered a neurological condition." },
  { category: "Mathematics", fact: "The <em>golden ratio</em> (approximately 1.618) appears in nature, art, and architecture worldwide.", detail: "It describes the ratio of a rectangle's sides that humans consistently find most aesthetically pleasing." },
  { category: "Mathematics", fact: "The digits of pi pass all known tests for <em>randomness</em> yet it has a precise, deterministic value.", detail: "Every sequence of digits you can think of appears somewhere in pi's infinite, non-repeating decimal." },
  { category: "Mathematics", fact: "There are exactly <em>5 Platonic solids</em> — and this was proven by the ancient Greeks.", detail: "The tetrahedron, cube, octahedron, dodecahedron, and icosahedron are the only regular polyhedra." },
  { category: "Linguistics", fact: "The longest word in the English language is <em>pneumonoultramicroscopicsilicovolcanoconiosis</em> at 45 letters.", detail: "It describes a lung disease caused by inhaling very fine volcanic dust particles." },
  { category: "Linguistics", fact: "Japanese has three completely <em>separate writing systems</em> used simultaneously.", detail: "Hiragana, katakana, and kanji each have different purposes — all appear in normal Japanese text." },
  { category: "Art & Music", fact: "The Beatles were once rejected by Decca Records with the note: <em>'Guitar groups are on the way out.'</em>", detail: "This 1962 rejection is considered the most costly mistake in music industry history." },
  { category: "Art & Music", fact: "The film industry term <em>'the fourth wall'</em> comes from classical theater.", detail: "The three walls of a stage set plus the imaginary wall between actors and audience make four." },
  { category: "Art & Music", fact: "Hip-hop was invented at a specific party on <em>August 11, 1973</em> in the Bronx, New York.", detail: "DJ Kool Herc extended the percussion break by using two copies of the same record — the genre began there." },
  { category: "Art & Music", fact: "The longest-running Broadway show is <em>The Phantom of the Opera</em> — running for 35 years.", detail: "It closed in 2023 after 13,981 performances, far exceeding any other show in Broadway history." },
  { category: "Economics", fact: "The GDP of <em>California</em> alone would rank it as the 5th largest economy in the world.", detail: "If it were an independent country, California would be between Germany and India in economic size." },
  { category: "Economics", fact: "The global chocolate industry is worth about <em>$130 billion per year</em>.", detail: "Despite this, the average cocoa farmer in West Africa earns less than $2 a day." },
  { category: "Medicine", fact: "The first successful <em>heart transplant</em> was performed by Dr. Christiaan Barnard in South Africa in 1967.", detail: "The patient, Louis Washkansky, lived for 18 days — dying of pneumonia, not rejection." },
  { category: "Medicine", fact: "Laughing genuinely activates the <em>same reward circuits</em> as cocaine in the brain.", detail: "Laughter releases dopamine, serotonin, and endorphins — a natural high with no side effects." },
  { category: "Medicine", fact: "Ancient Egyptians performed <em>brain surgery</em> — trepanation holes found in skulls show signs of healing.", detail: "Patients survived the operation, evidenced by bone regrowth around the drilled holes." },
  { category: "Astronomy", fact: "The Milky Way and Andromeda are approaching each other at <em>110 km per second</em>.", detail: "At this speed, the collision — a slow-motion galaxy merger — will begin in about 4.5 billion years." },
  { category: "Astronomy", fact: "Quasars are the brightest objects in the universe — some emit more light than a <em>trillion stars combined</em>.", detail: "They are powered by supermassive black holes actively consuming surrounding matter." },
  { category: "Philosophy", fact: "The <em>trolley problem</em> — devised in 1967 by philosopher Philippa Foot — is still unresolved in ethics.", detail: "It has spawned thousands of papers, real autonomous vehicle ethics frameworks, and no consensus." },
  { category: "Mythology", fact: "The myth of the <em>Minotaur</em> may have originated from actual Minoan bull-leaping rituals.", detail: "Frescoes at Knossos show acrobats vaulting over bulls — a dangerous sport that inspired legend." },
  { category: "Mythology", fact: "The word <em>'marathon'</em> comes from a legendary Greek messenger who ran 40 km to announce victory.", detail: "Pheidippides reportedly ran from the Battle of Marathon to Athens, declared victory, and died." },
  { category: "Mythology", fact: "Ancient Sumerians had a <em>flood myth strikingly similar to Noah's Ark</em> — written 1,000 years earlier.", detail: "The Epic of Gilgamesh describes a divine flood, a boat carrying all animals, and a released bird." },
  { category: "Animals", fact: "The immortal jellyfish's cell reversal process — transdifferentiation — converts <em>muscle cells into nerve cells</em>.", detail: "This ability to reprogram cells is being studied as a potential breakthrough in regenerative medicine." },
  { category: "Animals", fact: "The coelacanth was believed extinct for <em>65 million years</em> before a living specimen was caught in 1938.", detail: "It's sometimes called a 'living fossil' — its body design has barely changed in millions of years." },
  { category: "Animals", fact: "Sperm whales have the <em>largest brains</em> of any animal — weighing about 8 kg.", detail: "Despite this, their neurons are less densely packed than humans', so absolute size is misleading." },
  { category: "Animals", fact: "A woodpecker's tongue wraps around its <em>entire skull</em> when retracted.", detail: "It's anchored at the right nostril and loops over the top of the head, acting as a shock absorber when pecking." },
  { category: "Animals", fact: "The greater honeyguide bird leads humans to bee hives — a genuine <em>mutualistic relationship</em> with wild animals.", detail: "Tribes in Mozambique use a specific call to communicate with honeyguides, who then lead them to honey." },
  { category: "Animals", fact: "Fennec foxes have ears up to <em>15 cm long</em> relative to their small bodies.", detail: "The ears radiate heat to keep them cool in the Sahara and detect prey moving underground." },
  { category: "Animals", fact: "Crocodilians are more closely related to <em>birds</em> than to other reptiles like lizards.", detail: "Both are Archosaurs — the group that included dinosaurs — while lizards are more distantly related." },
  { category: "Animals", fact: "A group of turkeys is called a <em>rafter</em>.", detail: "Wild turkeys can fly at speeds of up to 55 mph over short distances, contrary to popular belief." },
  { category: "Animals", fact: "Bees have five eyes — two large compound eyes and <em>three simple ocelli</em> on top of the head.", detail: "The ocelli detect light intensity and help bees orient themselves in flight." },
  { category: "Animals", fact: "Manatees are the closest living relatives of <em>elephants</em>.", detail: "Both descended from the same land-dwelling ancestors — manatees returned to the sea roughly 60 million years ago." },
  { category: "Animals", fact: "A group of giraffes is called a <em>tower</em>.", detail: "Giraffes sleep for only about 30 minutes per day — usually in brief 5-minute naps standing up." },
  { category: "Animals", fact: "Bowhead whales can live for over <em>200 years</em> — the longest-lived mammals on Earth.", detail: "One bowhead whale was found with a 200-year-old harpoon tip still embedded in its flesh." },
  { category: "Animals", fact: "The tarsier has eyes so large relative to its body that they <em>cannot move in their sockets</em>.", detail: "It compensates by rotating its head 180 degrees — like an owl — to see to the side." },
  { category: "Animals", fact: "Leaf-cutter ants were farming <em>fungi</em> for food 50 million years before humans began agriculture.", detail: "They cut leaves as a substrate for growing specialized fungi that they exclusively eat." },
  { category: "Animals", fact: "The African lungfish can survive out of water for up to <em>4 years</em> in a mucus cocoon.", detail: "It dramatically slows its metabolism and waits out droughts buried in dried mud." },
  { category: "Animals", fact: "Seahorses are monogamous and greet their partners with an <em>elaborate daily dance</em>.", detail: "The dance can last up to an hour and reinforces the pair bond throughout the breeding season." },
