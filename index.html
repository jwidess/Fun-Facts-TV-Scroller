  { category: "Animals", fact: "The longest-lived land animal was Jonathan, a <em>Seychelles giant tortoise</em> who lived to at least 192.", detail: "He hatched around 1832 and was still alive as of recent records, living on Saint Helena island." },
  { category: "Animals", fact: "A group of bats is called a <em>colony</em> when roosting and a cloud when in flight.", detail: "The world's largest bat colony — at Bracken Cave, Texas — contains up to 20 million Mexican free-tailed bats." },
  { category: "Animals", fact: "Elephants show altruistic behavior — they've been documented helping <em>other species</em> in distress.", detail: "Rescues of other elephants, and even humans from mud pits, have been recorded." },
  { category: "Space", fact: "The closest star system to Earth, Alpha Centauri, is so far away a spaceship traveling at 60,000 km/h would take <em>77,000 years</em> to reach it.", detail: "The New Horizons probe, the fastest spacecraft ever launched, travels at roughly this speed." },
  { category: "Space", fact: "Pluto has a heart-shaped region of nitrogen ice the size of <em>Texas and Oklahoma combined</em>.", detail: "Named Tombaugh Regio after Pluto's discoverer, it was revealed by New Horizons in 2015." },
  { category: "Space", fact: "The rings of Saturn are only about <em>10 to 100 meters thick</em> despite spanning 282,000 km.", detail: "If Saturn's rings were scaled to a football field, they'd be thinner than a sheet of paper." },
  { category: "Space", fact: "Venus rotates <em>backwards</em> compared to most planets in the solar system.", detail: "If you stood on Venus, the Sun would rise in the west and set in the east." },
  { category: "Space", fact: "Jupiter's moon Ganymede is larger than the planet <em>Mercury</em>.", detail: "At 5,268 km in diameter, it's the largest moon in the solar system — bigger than Mercury's 4,880 km." },
  { category: "Space", fact: "There is a planet called <em>HD 189733b</em> where it rains liquid glass sideways at 8,700 km/h.", detail: "The blue color of this exoplanet comes from silicate particles in its hellish atmosphere." },
  { category: "Space", fact: "Sunspots appear dark because they are <em>4,000 degrees cooler</em> than the surrounding Sun surface.", detail: "They can last weeks and are caused by concentrated magnetic fields inhibiting heat flow." },
  { category: "Space", fact: "The Parker Solar Probe is the <em>fastest human-made object ever</em> — reaching 692,000 km/h near the Sun.", detail: "It's designed to fly within 6.1 million km of the Sun's surface." },
  { category: "History", fact: "The concept of a <em>weekend</em> was only standardized in the early 20th century.", detail: "The 5-day work week became standard in the US after Henry Ford adopted it in 1926." },
  { category: "History", fact: "The <em>safety pin</em> was invented in 1849 in under three hours by Walter Hunt, who needed to pay a $15 debt.", detail: "He sold the patent for $400 — his creditor made millions from manufacturing it." },
  { category: "History", fact: "In 1518, people in Strasbourg danced <em>uncontrollably for days</em> in what became known as the Dancing Plague.", detail: "Some dancers died from exhaustion; physicians of the time prescribed more dancing as a cure." },
  { category: "History", fact: "The Spanish flu pandemic of 1918 killed more people than <em>World War I</em>.", detail: "An estimated 50–100 million people died — roughly 3–5% of the world's entire population." },
  { category: "History", fact: "The first controlled nuclear chain reaction took place under a <em>squash court</em> at the University of Chicago in 1942.", detail: "Enrico Fermi led a team of 49 scientists in the Chicago Pile-1 experiment in complete secrecy." },
  { category: "History", fact: "Alexander the Great never lost a single <em>battle</em> in his entire military career.", detail: "He conquered an empire from Greece to northwestern India without ever suffering a military defeat." },
  { category: "History", fact: "The first human to <em>orbit the Earth</em> was Yuri Gagarin on April 12, 1961.", detail: "His flight lasted 108 minutes — and he ejected and parachuted back separately, as capsule landing wasn't safe." },
  { category: "History", fact: "Julius Caesar's assassination on the <em>Ides of March</em> (March 15, 44 BC) had been predicted by a soothsayer.", detail: "He reportedly dismissed the warning until the fateful day — meeting the soothsayer on his way to the Senate." },
  { category: "History", fact: "The first successful powered airplane flight by the Wright Brothers lasted only <em>12 seconds</em>.", detail: "The Flyer I traveled 37 meters on December 17, 1903 — by evening they'd extended it to 59 seconds." },
  { category: "History", fact: "Karl Marx wrote the Communist Manifesto in just <em>6 weeks</em> in 1848.", detail: "He and Engels were commissioned by the Communist League in London to produce a political program." },
  { category: "History", fact: "Plato's real name was <em>Aristocles</em> — Plato was a nickname meaning broad-shouldered.", detail: "He was a champion wrestler before turning to philosophy." },
  { category: "History", fact: "The Great Pyramid of Giza was the <em>tallest man-made structure</em> for over 3,800 years.", detail: "It wasn't surpassed until the completion of Lincoln Cathedral in England around 1311 AD." },
  { category: "History", fact: "Ancient Persian engineers built sophisticated underground aqueducts called <em>qanats</em>.", detail: "Some of these tunnels, dug by hand, are still functioning after 3,000 years." },
  { category: "Science", fact: "Mitochondria have their own DNA — evidence they were once <em>independent bacteria</em>.", detail: "Around 2 billion years ago, a bacterium was engulfed by another cell and became the powerhouse of all complex life." },
  { category: "Science", fact: "There are about 8.7 million species on Earth — but we've only formally identified about <em>1.5 million</em>.", detail: "An estimated 86% of species on land and 91% in the ocean have yet to be discovered and named." },
  { category: "Science", fact: "The Big Bang did not happen <em>at a single point in space</em> — space itself expanded.", detail: "There was no 'before' the Big Bang — time and space both began at that moment." },
  { category: "Science", fact: "The periodic table was predicted in a <em>dream</em> by Dmitri Mendeleev in 1869.", detail: "He reportedly saw the arrangement of elements by atomic weight in his sleep — and confirmed it upon waking." },
  { category: "Science", fact: "The most common element in the Earth's crust is <em>oxygen</em> — not iron or silicon.", detail: "Oxygen makes up 46% of Earth's crust by mass, mostly bound in silicate minerals." },
  { category: "Science", fact: "Carbon dioxide has been rising in Earth's atmosphere since the <em>industrial revolution</em> began.", detail: "Ice core data shows CO2 was stable at 280 ppm for 800,000 years before rising sharply to over 420 ppm." },
  { category: "Science", fact: "Soil contains roughly <em>three times more carbon</em> than the entire atmosphere.", detail: "Healthy soil management is therefore critical to climate regulation." },
  { category: "Science", fact: "There is a real geological layer called the <em>K-Pg boundary</em> marking the dinosaur extinction.", detail: "This thin layer of iridium-rich clay is visible worldwide — iridium is rare on Earth but common in asteroids." },
  { category: "Nature", fact: "The Yellowstone supervolcano erupts on a cycle of roughly <em>600,000 years</em> — and the last eruption was 640,000 years ago.", detail: "A future eruption could blanket the US in ash and dramatically cool global temperatures." },
  { category: "Nature", fact: "The ocean contains dissolved gold — about <em>20 million tonnes</em> spread through seawater.", detail: "At such low concentration, it's currently not economically viable to extract." },
  { category: "Nature", fact: "The Grand Canyon is still being <em>cut deeper</em> by the Colorado River.", detail: "About 1,500 tonnes of sediment pass through the canyon every day as the river slowly deepens the gorge." },
  { category: "Nature", fact: "The largest recorded earthquake in history occurred in <em>Chile in 1960</em> — magnitude 9.5.", detail: "The Valdivia earthquake triggered a Pacific-wide tsunami that reached Japan and the Philippines." },
  { category: "Nature", fact: "There are more individual trees in the <em>Amazon</em> than there are stars in the Milky Way.", detail: "The Amazon contains an estimated 390 billion trees across 5.5 million km2." },
  { category: "Nature", fact: "The Earth's core is approximately the same temperature as the <em>surface of the Sun</em> — about 5,700 degrees C.", detail: "This heat is left over from planetary formation and maintained by radioactive decay." },
  { category: "Nature", fact: "Ball lightning is a rare phenomenon where a <em>glowing sphere of plasma</em> floats slowly through the air.", detail: "It can last up to 25 seconds and pass through glass — its exact mechanism is still debated." },
  { category: "Human Body", fact: "You are taller in the morning than at night — by about <em>1 centimeter</em>.", detail: "Spinal discs compress under gravity throughout the day and re-expand overnight." },
  { category: "Human Body", fact: "Human teeth are the only part of the body that <em>cannot repair themselves</em>.", detail: "Enamel has no blood supply or living cells to rebuild damage — which is why fillings are necessary." },
  { category: "Human Body", fact: "The human body contains enough iron to make a <em>nail 7.5 cm long</em>.", detail: "Most of it is in hemoglobin — the protein in red blood cells that carries oxygen." },
  { category: "Human Body", fact: "The placenta is the only <em>disposable organ</em> in the human body.", detail: "It forms from both maternal and fetal tissue, then is expelled completely after birth." },
  { category: "Human Body", fact: "Your taste buds are replaced every <em>10 days</em>.", detail: "This rapid turnover means your sense of taste may gradually shift over time as you age." },
  { category: "Human Body", fact: "The middle ear contains the three smallest bones in the human body — the <em>hammer, anvil, and stirrup</em>.", detail: "All three could fit together on a penny; they transmit vibrations from the eardrum to the inner ear." },
  { category: "Human Body", fact: "The human body has about <em>650 skeletal muscles</em>.", detail: "If all your muscles pulled in the same direction at once, you could lift about 25 tonnes." },
  { category: "Human Body", fact: "The nose can warm incoming air from <em>freezing to body temperature</em> in a fraction of a second.", detail: "A network of blood vessels in the nasal cavity acts as a highly efficient heat exchanger." },
  { category: "Human Body", fact: "About 1 in 2,000 people are born with <em>tetrachromacy</em> — four types of cone cells instead of three.", detail: "Most are women, and they can distinguish colors in a range invisible to other humans." },
  { category: "Food", fact: "Spicy food triggers the release of <em>endorphins</em> — your brain's natural painkillers.", detail: "The burning sensation from capsaicin tricks the brain into releasing these natural opioids." },
  { category: "Food", fact: "Maple syrup requires about <em>40 liters of sap</em> to produce 1 liter of finished syrup.", detail: "The sap is collected in spring when days are warm but nights still freeze." },
  { category: "Food", fact: "The <em>Maillard reaction</em> — the browning of food when cooked — produces over 1,000 different flavor compounds.", detail: "Named after chemist Louis Maillard, it occurs above 140 degrees C and is responsible for most cooked flavors." },
  { category: "Geography", fact: "Iceland sits directly on the <em>Mid-Atlantic Ridge</em> — the boundary between the North American and Eurasian plates.", detail: "The island is literally splitting apart at 2.5 cm per year as the plates diverge." },
  { category: "Geography", fact: "The Dead Sea is the <em>lowest point on Earth's land surface</em> at 430 meters below sea level.", detail: "It's been getting smaller every year as the Jordan River is increasingly diverted for agriculture." },
  { category: "Geography", fact: "The equator passes through <em>13 countries</em>.", detail: "Ecuador is the only country named after the equator — 'Ecuador' means equator in Spanish." },
  { category: "Technology", fact: "The <em>microwave oven</em> was invented accidentally when Percy Spencer noticed radar waves melted his chocolate bar in 1945.", detail: "He was working on radar magnetrons when he noticed a peanut butter bar in his pocket had melted." },
  { category: "Technology", fact: "Electric vehicles have existed since the <em>1880s</em> — they outsold gasoline cars in the early 1900s.", detail: "Battery technology stagnated for a century while internal combustion engines improved rapidly." },
  { category: "Technology", fact: "The world's fastest supercomputer can perform over <em>1 quintillion operations per second</em>.", detail: "The Frontier supercomputer at Oak Ridge National Laboratory broke the exaFLOP barrier in 2022." },
  { category: "Technology", fact: "The first emoji was created in <em>1999</em> by Shigetaka Kurita for NTT DoCoMo in Japan.", detail: "His original set of 176 12x12 pixel icons is now in the Museum of Modern Art collection in New York." },
  { category: "Psychology", fact: "Humans have a documented tendency to <em>anthropomorphize</em> — attributing human qualities to objects.", detail: "We see faces in clouds, car fronts, and electrical outlets — the brain's face-detection system is on by default." },
  { category: "Psychology", fact: "Color affects <em>perception of temperature</em> — rooms painted blue feel cooler by several degrees.", detail: "This phenomenon is exploited in restaurant design, hospital color schemes, and product packaging." },
  { category: "Mathematics", fact: "Ancient Babylonians had a number system based on <em>60</em> — which is why we have 60 minutes and 60 seconds.", detail: "Base-60 was chosen because 60 has more divisors than any smaller number, making calculations easier." },
  { category: "Mathematics", fact: "The <em>Fibonacci sequence</em> appears in the spiral arrangement of seeds in sunflowers and the scales on pine cones.", detail: "Nature uses this pattern because it provides the most efficient packing of seeds in a spiral." },
  { category: "Linguistics", fact: "Shakespeare invented over <em>1,700 English words</em> still in use today.", detail: "Among them: bedroom, lonely, generous, gloomy, obscene, swagger, and countless others." },
  { category: "Linguistics", fact: "The language Esperanto was invented in <em>1887</em> by a Polish ophthalmologist.", detail: "L. L. Zamenhof created it as an international second language — it has an estimated 2 million speakers today." },
  { category: "Art & Music", fact: "The most expensive painting ever sold is <em>Leonardo da Vinci's Salvator Mundi</em> at $450 million.", detail: "Its authenticity is disputed — some art historians question whether Leonardo actually painted it." },
  { category: "Medicine", fact: "Cancer existed in <em>dinosaurs</em> — fossil bones show malignant tumor evidence from 240 million years ago.", detail: "This suggests cancer is an inevitable consequence of multicellular life, not a modern disease." },
  { category: "Astronomy", fact: "A neutron star contains more mass than the Sun compressed into a sphere the size of a <em>small city</em>.", detail: "A single teaspoon of neutron star material would weigh approximately 1 billion tonnes on Earth." },
  { category: "Philosophy", fact: "The <em>Fermi paradox</em> asks why, given the age and size of the universe, we haven't detected alien civilizations.", detail: "Over 50 solutions have been proposed — from self-destruction to the possibility we're genuinely alone." },
  { category: "Animals", fact: "The kiwi bird lays an egg so large it accounts for <em>20% of its body weight</em>.", detail: "Relative to body size, the kiwi egg is the largest of any bird — equivalent to a human giving birth to a 6-year-old." },
  { category: "Animals", fact: "Octopuses walk on two of their eight arms — the other six are used as <em>arms for manipulation</em>.", detail: "Research shows they consistently use the rear two for locomotion and the front six for tasks." },
  { category: "Animals", fact: "The bald eagle's nest, called an eyrie, can weigh over <em>a tonne</em> after years of additions.", detail: "Eagles return to the same nest each year, adding sticks, grass, and debris each breeding season." },
  { category: "Animals", fact: "Shrimp have their heart in their <em>head</em>.", detail: "Like most crustaceans, the heart is located in the cephalothorax — the fused head-and-body section." },
  { category: "Animals", fact: "A chameleon's color changes are primarily for <em>temperature regulation and communication</em>, not camouflage.", detail: "Their base color is already excellent camouflage — the dramatic changes are social signals." },
  { category: "Animals", fact: "A hippo can run at <em>30 km/h</em> on land — faster than most humans.", detail: "Despite their massive size and aquatic lifestyle, hippos can outrun the average person on flat ground." },
  { category: "Animals", fact: "The golden poison dart frog has enough toxin to kill <em>10 adult humans</em>.", detail: "Indigenous hunters coat blowdarts in its skin secretions — the toxin blocks nerve signals instantly." },
  { category: "Animals", fact: "Jellyfish have no <em>brain, heart, or blood</em> — just a basic nervous system.", detail: "Despite this, some species navigate, hunt, and exhibit complex behaviors driven only by nerve nets." },
  { category: "Animals", fact: "A group of hyenas is called a <em>cackle</em>.", detail: "Spotted hyenas are matriarchal — females are larger and socially dominant over all males." },
  { category: "Animals", fact: "The archerfish is the only fish known to <em>deliberately aim and shoot</em> at targets above the waterline.", detail: "It accounts for light refraction to hit targets up to 3 metres above the surface." },
  { category: "Animals", fact: "Vampire bats are the only mammals that survive on a <em>pure blood diet</em>.", detail: "They can detect blood vessels through infrared heat sensors near their nose." },
  { category: "Animals", fact: "A group of pandas is called an <em>embarrassment</em>.", detail: "Pandas have an extremely low reproductive rate — females are fertile for only 24–72 hours per year." },
  { category: "Animals", fact: "The brown bear has the largest home range of any <em>terrestrial mammal</em>.", detail: "A single bear may wander over 2,000 km2 in search of food throughout the year." },
  { category: "Animals", fact: "Pigeons were once the <em>fastest communication method</em> in the world and saved lives in both World Wars.", detail: "Carrier pigeon Cher Ami delivered a message that saved 194 trapped soldiers in WWI despite being shot." },
  { category: "Animals", fact: "The giant Pacific octopus can open a <em>childproof pill bottle</em> — no tool required.", detail: "Their ability to manipulate objects has made them a subject of intelligence research." },
  { category: "Space", fact: "The ISS travels so fast that astronauts see a <em>sunrise every 90 minutes</em>.", detail: "This means they witness 16 sunrises and sunsets in every 24-hour Earth day." },
  { category: "Space", fact: "Jupiter acts as a giant <em>vacuum cleaner</em> for the solar system.", detail: "Its massive gravity captures or deflects many asteroids and comets that might otherwise hit the inner planets." },
  { category: "Space", fact: "The total mass of the asteroid belt is less than <em>4% of the Moon's mass</em>.", detail: "Movies portray it as dense and dangerous — in reality it's mostly empty space." },
  { category: "Space", fact: "Titan's methane cycle mirrors Earth's water cycle — rain, rivers, lakes, and <em>evaporation</em> all occur.", detail: "It's the only world besides Earth known to have a stable liquid cycle on its surface." },
  { category: "Space", fact: "The Sun is so large that even traveling at the speed of light, it takes <em>4.6 seconds</em> to cross its diameter.", detail: "A beam of light would take about 1.3 seconds to reach the Moon from Earth." },
  { category: "History", fact: "The first copyright law was passed in <em>Britain in 1710</em> — the Statute of Anne.", detail: "It gave authors rights over their work for 14 years — a stark contrast to today's life-plus-70-year terms." },
  { category: "History", fact: "Ancient Chinese invented <em>toilet paper</em> in the 6th century AD.", detail: "European visitors in the 13th century were astonished — paper was considered too valuable to wipe with in the West." },
  { category: "History", fact: "The Great Wall was built primarily to <em>control trade and immigration</em>, not just for military defense.", detail: "Gates and checkpoints along the wall regulated movement and taxed goods flowing between regions." },
  { category: "History", fact: "Medieval knights earned the title through years of service — not simply by being <em>born noble</em>.", detail: "Becoming a knight required serving as a page, then squire, with knighting typically occurring around age 21." },
  { category: "History", fact: "The world's oldest continuously inhabited city is debated — but <em>Damascus or Jericho</em> are top contenders.", detail: "Jericho has evidence of habitation from 10,000 BC; Damascus from at least 9,000 BC." },
  { category: "History", fact: "Ancient Rome had a <em>welfare program</em> — the annona — that distributed free grain to citizens.", detail: "At its peak, over 200,000 Romans received free grain monthly from state warehouses." },
  { category: "History", fact: "Columbus never actually <em>set foot on the North American mainland</em>.", detail: "His four voyages reached the Caribbean, Central America, and South America — never what is now the continental US." },
  { category: "History", fact: "The Colosseum held between <em>50,000 and 80,000 spectators</em> and had 80 entrances.", detail: "Its numbered entrance tickets and seating sections were a model for modern stadium design." },
  { category: "History", fact: "Marie Curie's notebooks are still so <em>radioactive</em> they're kept in lead-lined boxes.", detail: "Researchers must sign liability waivers and wear protective gear to access them." },
  { category: "History", fact: "The first published <em>novel written in English</em> is generally considered to be Robinson Crusoe (1719).", detail: "Daniel Defoe's account of a castaway drew on the real story of Alexander Selkirk, marooned for 4 years." },
  { category: "Science", fact: "Humans are the only animals known to <em>deliberately make music</em> for pleasure.", detail: "While other animals make sounds and some respond to music, intentional musical creation is uniquely human." },
  { category: "Science", fact: "The word <em>'theory'</em> in science means a well-tested explanation — not a guess.", detail: "Evolution, gravity, and germ theory are all 'theories' — meaning they're among the best-supported ideas in science." },
  { category: "Science", fact: "The fastest wind speed ever recorded was <em>408 km/h</em> during Tropical Cyclone Olivia in 1996.", detail: "This gust occurred on Barrow Island in Australia, measured by an automated weather station." },
  { category: "Science", fact: "Water is one of the <em>only substances that expands when it freezes</em>.", detail: "Most materials contract when cooled; water's expansion is why pipes burst in winter and why ice floats." },
  { category: "Science", fact: "An individual human cell contains about <em>6 feet of DNA</em> tightly coiled.", detail: "If all the DNA in all your cells were stretched out, it would reach Pluto and back — multiple times." },
  { category: "Science", fact: "The Higgs boson — discovered in 2012 — is sometimes called the <em>'God Particle'</em>.", detail: "Physicist Leon Lederman originally called it the 'Goddamn Particle' — publishers changed it for the book title." },
  { category: "Science", fact: "Octopus ink contains <em>tyrosinase</em> — an enzyme that blinds predators by overwhelming their smell receptors.", detail: "The ink cloud also mimics the octopus's shape, giving it time to escape." },
  { category: "Science", fact: "Cats can hear frequencies up to <em>79,000 Hz</em> — humans can only hear up to 20,000 Hz.", detail: "This allows cats to hear ultrasonic mouse vocalizations that are completely inaudible to humans." },
  { category: "Science", fact: "The average raindrop falls at about <em>9 meters per second</em>.", detail: "Terminal velocity for raindrops varies with size — the smallest drizzle drops fall at just 0.9 m/s." },
  { category: "Science", fact: "Photons — particles of light — experience <em>no passage of time</em> from their own reference frame.", detail: "From the perspective of a photon, it travels from its source to destination instantaneously." },
  { category: "Nature", fact: "The blue whale is so large its heartbeat can be <em>detected 3 km away</em> with equipment.", detail: "Researchers tagged blue whales with sensor devices to record the first-ever wild blue whale heart rate." },
  { category: "Nature", fact: "There are more species of <em>beetle</em> than any other order of animal.", detail: "When asked what God's creation revealed about him, biologist J.B.S. Haldane reportedly said: 'an inordinate fondness for beetles.'" },
  { category: "Nature", fact: "The inside of a tornado has lower air pressure — some buildings <em>explode outward</em> rather than being pushed over.", detail: "The pressure differential between inside and outside a building can shatter it from within." },
  { category: "Nature", fact: "Sea glass is made from <em>discarded bottles and glassware</em> tumbled smooth by decades of wave action.", detail: "Genuine sea glass takes 20–40 years to develop its characteristic frosted, rounded texture." },
  { category: "Nature", fact: "Forest fires release nutrients locked in dead wood — some ecosystems depend on them to <em>regenerate</em>.", detail: "Lodgepole pine cones only open to release seeds after being exposed to fire's intense heat." },
  { category: "Nature", fact: "The Moon's gravitational influence on Earth extends much further than the tides — it also <em>stabilizes Earth's axial tilt</em>.", detail: "Without the Moon's gravitational steadying, Earth's tilt could vary wildly, causing dramatic climate shifts." },
  { category: "Nature", fact: "The total biomass of all insects on Earth is greater than the <em>total biomass of all vertebrates combined</em>.", detail: "Insects form the base of most terrestrial food webs and provide essential ecosystem services." },
  { category: "Human Body", fact: "Humans are born with more <em>taste buds</em> than they'll ever have again.", detail: "Babies have taste receptors on the roof, sides, and back of the mouth — most disappear in early childhood." },
  { category: "Human Body", fact: "The human brain contains about <em>86 billion neurons</em> — roughly equal to the number of stars in the Milky Way.", detail: "Each neuron can form thousands of connections — creating a network of staggering complexity." },
  { category: "Human Body", fact: "Your body processes food so efficiently that you absorb about <em>95% of the calories</em> you eat.", detail: "The remaining 5% is mostly fiber, which passes through undigested." },
  { category: "Human Body", fact: "The human body makes a completely <em>new skeleton</em> approximately every 10 years.", detail: "While bones seem permanent, they're constantly being broken down and rebuilt through remodeling." },
  { category: "Human Body", fact: "On average, people dream for a total of <em>6 years</em> over a lifetime.", detail: "Dream sleep (REM) occurs in multiple cycles each night, increasing in duration toward morning." },
  { category: "Human Body", fact: "Nerve signals in the human brain travel at speeds of up to <em>120 meters per second</em>.", detail: "Unmyelinated nerve fibers move much slower — the difference explains fast reflexes vs. slow aches." },
  { category: "Food", fact: "The fear of <em>running out of coffee</em> has been nicknamed 'coffeephobia' by devotees.", detail: "The global coffee industry is worth over $460 billion — the world's most widely consumed psychoactive substance." },
  { category: "Food", fact: "Gelatin — used in jelly, marshmallows, and gummy bears — is made from <em>animal collagen</em>.", detail: "It's extracted by boiling the bones, skin, and cartilage of cows and pigs." },
  { category: "Food", fact: "The average person eats about <em>5 pounds of salt</em> per year.", detail: "Most of it comes from processed food — only about 11% is added at the table." },
  { category: "Food", fact: "Popcorn was eaten at <em>movie theaters</em> starting in the 1930s — theaters initially banned it.", detail: "Owners worried about the mess and noise, but vendors outside theaters were so profitable theaters caved." },
  { category: "Food", fact: "A raw egg sinks in fresh water but <em>floats in salt water</em>.", detail: "This same principle can be used to test egg freshness — older eggs float due to air pocket development." },
  { category: "Food", fact: "Lychee fruit has been linked to a mysterious <em>brain disease</em> in Indian children for decades.", detail: "Scientists discovered in 2017 that unripe lychees eaten on an empty stomach cause hypoglycemic encephalopathy." },
  { category: "Geography", fact: "The Bering Strait between Alaska and Russia is only <em>85 km wide</em>.", detail: "During the last ice age, sea levels dropped enough to expose a land bridge allowing humans to migrate to the Americas." },
  { category: "Geography", fact: "The landlocked country of <em>Uzbekistan</em> is doubly landlocked — surrounded by countries that are also landlocked.", detail: "The other doubly landlocked country is Liechtenstein." },
  { category: "Geography", fact: "Vatican City issues its own <em>passports, coins, stamps, and license plates</em>.", detail: "It has a population of around 800 and its own radio station, newspaper, and train station." },
  { category: "Geography", fact: "The Mississippi River flows into the Gulf of Mexico and deposits enough sediment to add <em>new land</em> to Louisiana each year.", detail: "It's also slowly changing course — it would naturally divert into the Atchafalaya basin without engineering controls." },
  { category: "Geography", fact: "The world's highest lake is a volcanic crater lake in <em>Ojos del Salado, Chile</em> at 6,390 meters.", detail: "The mountain itself is the world's highest volcano at 6,893 meters." },
  { category: "Geography", fact: "The Gobi Desert — despite being in Asia — regularly experiences <em>snow in winter</em>.", detail: "It's a cold desert, not a hot one — temperatures can drop to -40 degrees C in winter." },
  { category: "Technology", fact: "The first <em>color television broadcast</em> in the US aired on CBS on June 25, 1951.", detail: "Only a handful of people could watch it — there were virtually no color TV sets in existence yet." },
  { category: "Technology", fact: "The coding language <em>Python</em> is named after the British comedy group Monty Python.", detail: "Creator Guido van Rossum was reading Monty Python scripts when he named it in 1989." },
  { category: "Technology", fact: "The Apollo 11 landing site coordinates were programmed into the <em>guidance computer by hand</em>.", detail: "The software team, led by Margaret Hamilton, coded 145,000 lines of assembly by hand — with no bugs during the mission." },
  { category: "Technology", fact: "The world's first <em>webcam</em> was created in 1991 to watch a coffee pot at Cambridge University.", detail: "Researchers pointed it at their shared pot to check if coffee was ready without leaving their desks." },
  { category: "Technology", fact: "A standard QWERTY keyboard has enough keys to type more than <em>10^49 unique combinations</em>.", detail: "The specific layout means the word 'typewriter' can be typed using only the top row of keys." },
  { category: "Psychology", fact: "People overestimate how much others notice their appearance and behavior — called the <em>spotlight effect</em>.", detail: "In reality, others are far too preoccupied with their own concerns to notice our perceived flaws." },
  { category: "Psychology", fact: "The <em>halo effect</em> causes us to assume attractive people are also smarter, kinder, and more competent.", detail: "This unconscious bias affects hiring decisions, jury verdicts, and even political elections." },
  { category: "Psychology", fact: "Humans have a tendency to see <em>patterns in random data</em> — called apophenia.", detail: "We evolved to detect predators and patterns; as a result we sometimes see meaning where none exists." },
  { category: "Mathematics", fact: "The sum of all angles in any <em>triangle</em> is always exactly 180 degrees — but only on flat surfaces.", detail: "On a sphere, triangle angles sum to more than 180 degrees — this is spherical geometry." },
  { category: "Mathematics", fact: "The concept of <em>infinity</em> has different sizes — some infinities are bigger than others.", detail: "Georg Cantor proved that the infinity of real numbers is strictly larger than the infinity of whole numbers." },
  { category: "Linguistics", fact: "There are over <em>300 different sign languages</em> used around the world.", detail: "American Sign Language is entirely unrelated to British Sign Language despite both serving English speakers." },
  { category: "Art & Music", fact: "The human voice is the world's oldest musical instrument — predating all <em>other instruments by thousands of years</em>.", detail: "Singing is considered central to social bonding and ritual in every known human culture." },
  { category: "Art & Music", fact: "Over <em>10 million songs</em> have been uploaded to Spotify — most receive fewer than 1,000 streams.", detail: "The vast majority of recorded music goes largely unheard in the streaming era." },
  { category: "Economics", fact: "The global <em>black market</em> is estimated to represent about 20–25% of all economic activity worldwide.", detail: "Illegal drug markets, counterfeit goods, and unreported labor account for trillions of dollars annually." },
  { category: "Medicine", fact: "The appendix was only confirmed to have a function — storing <em>gut bacteria</em> — relatively recently.", detail: "After illness wipes out gut flora, the appendix may act as a reserve to repopulate the microbiome." },
  { category: "Medicine", fact: "Surgery performed under <em>general anesthesia</em> was first successfully done in 1846.", detail: "Before ether, patients were conscious during operations — surgeons competed on speed, not precision." },
  { category: "Astronomy", fact: "The Andromeda Galaxy contains about <em>one trillion stars</em> — more than twice as many as the Milky Way.", detail: "Despite this, both galaxies have roughly the same mass — Andromeda has more visible stars but less dark matter." },
  { category: "Astronomy", fact: "The first object to be designated a <em>dwarf planet</em> was Pluto in 2006.", detail: "The reclassification was controversial — a vote of only 424 astronomers (out of thousands) made the decision." },
  { category: "Philosophy", fact: "The ancient Chinese philosopher <em>Zhuangzi</em> once dreamed he was a butterfly.", detail: "He then asked — was he a man who dreamed of being a butterfly, or a butterfly now dreaming of being a man?" },
  { category: "Mythology", fact: "The <em>labyrinth</em> of Greek mythology may have been based on the actual complex palace of Knossos in Crete.", detail: "The Minoan palace had hundreds of rooms and corridors — easily interpreted as a maze by later visitors." },
  { category: "Animals", fact: "The axolotl can regrow not just limbs but also parts of its <em>heart and spinal cord</em>.", detail: "No mammal can do this — the axolotl's genome is 10 times larger than a human's, partly explaining its repair abilities." },
  { category: "Animals", fact: "Bowerbirds build elaborate <em>decorated structures</em> to attract mates — but never live in them.", detail: "Male satin bowerbirds collect blue objects obsessively; females choose the best decorator." },

  { category: "Space", fact: "The temperature of space is not zero — it's about <em>-270.45 degrees C</em> (2.7 Kelvin).", detail: "This background warmth is the leftover radiation from the Big Bang — the Cosmic Microwave Background." },
  { category: "Space", fact: "Over a million Earth-sized planets could fit inside the Sun — but if you compressed the Sun to a <em>neutron star</em>, it would fit in a city.", detail: "The density of stellar matter spans extremes that defy everyday intuition." },

  { category: "Human Body", fact: "The human body has more <em>sweat glands</em> per unit of skin than almost any other mammal.", detail: "About 2–4 million eccrine sweat glands cover the body — crucial for the endurance running that defines our species." },
];

let facts = ALL_FACTS;

// Time-based starting index — uses a fixed epoch so position never resets.
// Cycles through all facts continuously regardless of page reloads or incognito.
const EPOCH = new Date('2024-01-01T00:00:00').getTime();
const msElapsedInSlot = (Date.now() - EPOCH) % DISPLAY_DURATION;
const msRemainingInSlot = DISPLAY_DURATION - msElapsedInSlot;
const startIndex = Math.floor((Date.now() - EPOCH) / DISPLAY_DURATION) % facts.length;
let currentIndex = startIndex;
let progressTimer = null;
let nextTimer = null;
let nextCountdown = DISPLAY_DURATION / 1000;

// Clock
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
setInterval(updateClock, 1000);
updateClock();

// Render a single fact
function renderFact(fact, index) {
  const card = document.getElementById('factCard');
  document.getElementById('factCounter').textContent = `Fact ${index + 1} of ${facts.length}`;
  card.innerHTML = `
    <div class="fact-number">${String(index + 1).padStart(2, '0')}</div>
    <div class="fact-category">${fact.category}</div>
    <p class="fact-text">${fact.fact}</p>
    <div class="fact-divider"></div>
    <p class="fact-trivia">${fact.detail}</p>
  `;
}

// Animate progress bar
function startProgress(duration) {
  const bar = document.getElementById('progressBar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  bar.getBoundingClientRect();
  bar.style.transition = `width ${duration}ms linear`;
  bar.style.width = '100%';
}

// Countdown
function formatCountdown(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m > 0 ? `${m}m ${s.toString().padStart(2,'0')}s` : `${s}s`;
}

function startCountdown(seconds) {
  nextCountdown = seconds;
  document.getElementById('nextIn').textContent = formatCountdown(seconds);
  if (nextTimer) clearInterval(nextTimer);
  nextTimer = setInterval(() => {
    nextCountdown--;
    document.getElementById('nextIn').textContent = formatCountdown(Math.max(0, nextCountdown));
  }, 1000);
}

// Transition & show fact. duration defaults to full DISPLAY_DURATION.
async function showFact(index, duration = DISPLAY_DURATION) {
  currentIndex = index;
  const overlay = document.getElementById('overlay');
  overlay.classList.add('active');
  await sleep(500);

  renderFact(facts[index], index);
  startProgress(duration);
  startCountdown(Math.round(duration / 1000));
  overlay.classList.remove('active');

  if (progressTimer) clearTimeout(progressTimer);
  progressTimer = setTimeout(() => {
    const next = (index + 1) % facts.length;
    showFact(next); // subsequent facts always get full duration
  }, duration);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// Start at the time-based fact for right now, with correct remaining time in slot
showFact(startIndex, msRemainingInSlot);

// Navigation buttons
document.getElementById('nextBtn').addEventListener('click', () => {
  clearTimeout(progressTimer);
  clearInterval(nextTimer);
  const next = (currentIndex + 1) % facts.length;
  showFact(next);
});

document.getElementById('prevBtn').addEventListener('click', () => {
  clearTimeout(progressTimer);
  clearInterval(nextTimer);
  const prev = (currentIndex - 1 + facts.length) % facts.length;
  showFact(prev);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
});
</script>
