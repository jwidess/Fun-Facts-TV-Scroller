<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Facts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #0a0a0f;
    --card: #111118;
    --accent: #f0c040;
    --accent2: #e05a2b;
    --text: #f0ece0;
    --muted: #888070;
    --border: rgba(240,192,64,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 90%, rgba(224,90,43,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 10%, rgba(240,192,64,0.07) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle grid texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 48px 72px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.2s;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .logo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 1;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .fact-counter {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Main fact card */
  .fact-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .fact-card {
    max-width: 1100px;
    width: 100%;
    position: relative;
  }

  .fact-category {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.35em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .fact-number {
    position: absolute;
    top: -30px;
    right: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 180px;
    line-height: 1;
    color: rgba(240,192,64,0.04);
    pointer-events: none;
    user-select: none;
  }

  .fact-text {
    font-size: clamp(32px, 3.2vw, 54px);
    font-weight: 300;
    line-height: 1.35;
    color: var(--text);
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.1s;
  }

  .fact-text em {
    font-style: italic;
    color: var(--accent);
    font-weight: 300;
  }

  .fact-divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    margin: 32px 0;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }

  .fact-trivia {
    font-size: 32px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.6;
    max-width: 700px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .loading-dots {
    display: flex;
    gap: 12px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  .loading-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Progress bar */
  .progress-track {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    z-index: 10;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    width: 0%;
    transition: width linear;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 48px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
  }

  .next-label {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .next-label::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 1px;
    background: var(--muted);
  }

  .source-tag {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: rgba(136,128,112,0.5);
    text-transform: uppercase;
  }

  /* Transition overlay */
  .transition-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .transition-overlay.active { opacity: 1; }

  /* Corner accents */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    opacity: 0.3;
  }
  .corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
  .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(0.7); opacity: 0.4; }
    50% { transform: scale(1); opacity: 1; }
  }

  /* Nav arrows */
  .nav-arrows {
    display: flex;
    gap: 12px;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 22px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    line-height: 1;
  }

  .nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,192,64,0.08);
  }

  .nav-btn:active {
    transform: scale(0.92);
  }

</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="transition-overlay" id="overlay"></div>

<div class="container">
  <header class="header">
    <div class="logo">
      <span class="logo-label">Daily</span>
      <span class="logo-title">Fun Facts</span>
    </div>
    <div class="header-right">
      <span class="fact-counter" id="factCounter">Fact 1 of 10</span>
      <span class="clock" id="clock">—</span>
    </div>
  </header>

  <main class="fact-stage">
    <div class="fact-card" id="factCard">
      <div class="loading-state">
        <div class="loading-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <p class="loading-text">Fetching amazing facts…</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span class="next-label">Next fact in <span id="nextIn">—</span></span>
    <div class="nav-arrows">
      <button class="nav-btn" id="prevBtn" title="Previous fact">&#8592;</button>
      <button class="nav-btn" id="nextBtn" title="Next fact">&#8594;</button>
    </div>
    <span class="source-tag">6969 curated facts</span>
  </footer>
</div>

<div class="progress-track">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>
const DISPLAY_DURATION = 180000; // 3 minutes per fact


// ── Facts are loaded from facts.json ──────────────────
let facts = [];
let currentIndex = 0;
let progressTimer = null;
let nextTimer = null;
let nextCountdown = 0;

const EPOCH = new Date('2024-01-01T00:00:00').getTime();

// Clock
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
setInterval(updateClock, 1000);
updateClock();

// Render a single fact
function renderFact(fact, index) {
  const card = document.getElementById('factCard');
  document.getElementById('factCounter').textContent = `Fact ${index + 1} of ${facts.length}`;
  card.innerHTML = `
    <div class="fact-number">${String(index + 1).padStart(2, '0')}</div>
    <div class="fact-category">${fact.category}</div>
    <p class="fact-text">${fact.fact}</p>
    <div class="fact-divider"></div>
    <p class="fact-trivia">${fact.detail}</p>
  `;
}

// Animate progress bar
function startProgress(duration) {
  const bar = document.getElementById('progressBar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  bar.getBoundingClientRect();
  bar.style.transition = `width ${duration}ms linear`;
  bar.style.width = '100%';
}

// Countdown
function formatCountdown(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m > 0 ? `${m}m ${s.toString().padStart(2,'0')}s` : `${s}s`;
}

function startCountdown(seconds) {
  nextCountdown = seconds;
  document.getElementById('nextIn').textContent = formatCountdown(seconds);
  if (nextTimer) clearInterval(nextTimer);
  nextTimer = setInterval(() => {
    nextCountdown--;
    document.getElementById('nextIn').textContent = formatCountdown(Math.max(0, nextCountdown));
  }, 1000);
}

// Transition & show fact
async function showFact(index, duration = DISPLAY_DURATION) {
  currentIndex = index;
  const overlay = document.getElementById('overlay');
  overlay.classList.add('active');
  await sleep(500);

  renderFact(facts[index], index);
  startProgress(duration);
  startCountdown(Math.round(duration / 1000));
  overlay.classList.remove('active');

  if (progressTimer) clearTimeout(progressTimer);
  progressTimer = setTimeout(() => {
    const next = (index + 1) % facts.length;
    showFact(next);
  }, duration);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// Navigation buttons
document.getElementById('nextBtn').addEventListener('click', () => {
  clearTimeout(progressTimer);
  clearInterval(nextTimer);
  showFact((currentIndex + 1) % facts.length);
});

document.getElementById('prevBtn').addEventListener('click', () => {
  clearTimeout(progressTimer);
  clearInterval(nextTimer);
  showFact((currentIndex - 1 + facts.length) % facts.length);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
});

// Load facts from external JSON, then start at the time-based position
fetch('facts.json')
  .then(r => r.json())
  .then(data => {
    facts = data;
    const msElapsed = (Date.now() - EPOCH) % DISPLAY_DURATION;
    const msRemaining = DISPLAY_DURATION - msElapsed;
    const startIndex = Math.floor((Date.now() - EPOCH) / DISPLAY_DURATION) % facts.length;
    currentIndex = startIndex;
    showFact(startIndex, msRemaining);
  })
  .catch(err => {
    document.getElementById('factCard').innerHTML =
      `<p class="fact-text" style="color:#e63946">Could not load facts.json — make sure it is in the same folder as this HTML file.<br><br>${err.message}</p>`;
  });
</script>
</body>
</html>
